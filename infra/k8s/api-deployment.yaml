apiVersion: apps/v1
kind: Deployment
metadata:
  name: recupero-api
  namespace: recupero
  labels: { app: recupero-api }
spec:
  replicas: 2               # floor; the HPA scales up from here
  selector:
    matchLabels: { app: recupero-api }
  template:
    metadata:
      labels: { app: recupero-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/recupero/recupero-api@sha256:REPLACE_WITH_DIGEST
          command: ["uvicorn", "recupero.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
          ports:
            - { containerPort: 8000, name: http }
          envFrom:
            - secretRef: { name: recupero-app }
          # Stateless: the shared Redis rate-limiter + api-key cache
          # (RECUPERO_REDIS_URL) make N replicas behave as one.
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: recupero-api
  namespace: recupero
  labels: { app: recupero-api }
spec:
  selector: { app: recupero-api }
  ports:
    - { port: 80, targetPort: 8000, name: http }
