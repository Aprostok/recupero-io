# Recupero default configuration.
# Override per-case with --config path/to/case.yaml or CLI flags.

trace:
  # Maximum hops from the seed (victim) address.
  # Phase 1 default is 1 — we want first-hop outflows clean before going deeper.
  max_depth: 1

  # Skip individual transfers below this USD value at time of tx.
  # Filters dust attacks and tiny incidental transfers.
  dust_threshold_usd: 50.0

  # Stop following a path once it deposits to a labeled exchange — we have what
  # we need (the freeze point). Set false to continue traversing past CEX deposits.
  stop_at_exchange: true

  # Look only at transfers occurring at or after the incident timestamp.
  # Set buffer_minutes to look slightly before in case the victim's reported time
  # is approximate.
  incident_buffer_minutes: 60

  # Maximum number of transfers to follow per address (sanity cap).
  max_transfers_per_address: 500

  # Service-wallet detection: if a wallet emits more than this many
  # outflows in the trace window, treat it as service-like (unlabeled
  # exchange, OTC desk, token distributor) and don't follow its
  # downstream branches. We still keep its transfers for the audit
  # trail. Tuned conservatively: real perp paths in published thefts
  # cap out at ~30 outflows per hop.
  service_wallet_outflow_threshold: 200

ethereum:
  # Etherscan API v2 endpoint (multichain). chainid=1 is mainnet.
  api_base: "https://api.etherscan.io/v2/api"
  chain_id: 1

  # Rate limit on free tier: 5 req/sec, 100k req/day.
  # 4.5 leaves a small margin under the 5/sec cap to avoid 429s
  # while making full use of the free tier.
  requests_per_second: 4.5

  # Block range chunking when querying transfer history.
  block_range_chunk: 10000

  # Native asset
  native_symbol: "ETH"
  native_decimals: 18

pricing:
  provider: "coingecko"
  # Free tier: ~30 calls/minute. We cache aggressively.
  requests_per_second: 0.5
  # If a token has no CoinGecko mapping, write null and flag in report.
  fail_open: true

storage:
  data_dir: "./data"
  # Pretty-print case.json (slower but git-diff-friendly during development).
  pretty_json: true

logging:
  level: "INFO"
  format: "rich"   # "rich" or "json"
