<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recupero — Address Profile</title>
<link rel="stylesheet" href="/v1/console/app.css">
<style>
  /* page-specific: address profile */
  .tags span {
    display: inline-flex; align-items: center; gap: .3rem;
    background: var(--crit-soft); color: var(--crit); border-radius: 999px;
    padding: .18rem .65rem; margin: 0 .3rem .3rem 0; font-size: .78rem; font-weight: 700;
    border: 1px solid var(--crit-border);
  }
  .conf-high   { color: var(--crit); font-weight: 700; }
  .conf-medium { color: var(--warn); font-weight: 600; }
  .conf-low    { color: var(--ink-soft); }
  .note-callout {
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: .5rem .8rem;
    font-size: .82rem; margin-top: .6rem; color: var(--ink-soft);
  }
  .inv-note {
    background: var(--warn-soft); border-left: 3px solid var(--warn);
    border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: .55rem .8rem;
    font-size: .82rem; font-style: italic;
  }
  .addr-panel {
    background: var(--surface); border: 1px solid var(--hair); border-radius: var(--r);
    padding: .85rem 1.1rem; box-shadow: var(--shadow-sm); margin-top: .8rem;
  }
  .addr-row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
  .chain-chip {
    display: inline-block; padding: .1rem .5rem; border-radius: 999px; font-size: .68rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    background: var(--surface-2); border: 1px solid var(--hair); color: var(--ink-soft);
  }
</style>
</head>
<body>
  <h1>🔎 Address Profile</h1>
  <div class="sub">Type any address to screen it against OFAC + mixer + ransomware + drainer seeds and the
    cross-case index. Paste your operator key; data is fetched from the admin-gated API (the key stays in a
    request header, never the URL).</div>

  <div class="bar">
    <input id="key" type="password" placeholder="X-Recupero-Admin-Key" size="30" autocomplete="off">
    <input id="addr" type="text" placeholder="address (0x… / T… / base58)" size="44" autocomplete="off">
    <select id="chain">
      <option>ethereum</option><option>arbitrum</option><option>base</option><option>optimism</option>
      <option>bsc</option><option>polygon</option><option>avalanche</option><option>tron</option>
      <option>solana</option><option>bitcoin</option>
    </select>
    <button id="go">Screen</button>
    <span id="msg"></span>
  </div>

  <div id="out"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  try { $("key").value = sessionStorage.getItem("rk_admin_key") || ""; } catch (e) {}
  function setMsg(t, cls) { var m = $("msg"); m.textContent = t || ""; m.className = cls || ""; }
  function key() { return ($("key").value || "").trim(); }

  var BAND_ICON = { sanctioned: "&#9940;", high: "&#128308;", medium: "&#128992;", low: "&#128993;", clean: "&#9989;" };
  var TAG_ICONS = { "OFAC-sanctioned": "&#9940;", "Mixer": "&#128260;", "Ransomware": "&#128128;", "Drainer": "&#129383;" };

  // ── Block-explorer address URL by chain ─────────────────────────────────
  var _EXPLORER = {
    ethereum:  "https://etherscan.io/address/",
    arbitrum:  "https://arbiscan.io/address/",
    base:      "https://basescan.org/address/",
    optimism:  "https://optimistic.etherscan.io/address/",
    bsc:       "https://bscscan.com/address/",
    polygon:   "https://polygonscan.com/address/",
    avalanche: "https://snowtrace.io/address/",
    bitcoin:   "https://mempool.space/address/",
    solana:    "https://explorer.solana.com/address/",
    tron:      "https://tronscan.org/#/address/"
  };
  function explorerUrl(chain, addr) {
    var base = _EXPLORER[(chain || "ethereum").toLowerCase()];
    if (!base || !addr) return null;
    return base + encodeURIComponent(addr);
  }

  // ── Confidence cell: score ring for 0-1 numerics, coloured text otherwise ─
  function confCell(c) {
    if (c == null || c === "") return '<span class="conf-low">&#8212;</span>';
    var n = parseFloat(String(c));
    if (!isNaN(n) && n >= 0 && n <= 1) {
      var cls = n >= 0.8 ? "r-ok" : n >= 0.5 ? "r-high" : "r-crit";
      return '<span class="score-ring sm ' + cls + '" style="--score:' + (n*10) + ';vertical-align:middle">' +
             '<span class="ring-inner" style="font-size:.45rem">' + Math.round(n*100) + '</span></span>';
    }
    var s = String(c).toLowerCase();
    var cls2 = s === "high" ? "conf-high" : s === "medium" ? "conf-medium" : "conf-low";
    return '<span class="' + cls2 + '">' + esc(c) + '</span>';
  }

  function card(v, l, cls) {
    return '<div class="card ' + (cls || "") + '"><div class="v">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>';
  }

  // ── Category color map for donut + legend ────────────────────────────────
  var _CAT_COLORS = {
    ransomware: '#ef4444', mixer: '#8b5cf6', scam: '#f59e0b', fraud: '#f97316',
    exchange: '#22d3ee', cex: '#22d3ee', sanctioned: '#dc2626', sanctions: '#dc2626',
    darkmarket: '#6366f1', drainer: '#ec4899', defi: '#10b981', bridge: '#06b6d4',
    seed: '#64748b', unknown: '#94a3b8'
  };
  function catColor(cat) {
    var lc = String(cat || "unknown").toLowerCase();
    for (var k in _CAT_COLORS) { if (lc.indexOf(k) !== -1) return _CAT_COLORS[k]; }
    var h = 0;
    for (var i = 0; i < lc.length; i++) { h = ((h * 31) + lc.charCodeAt(i)) & 0xffff; }
    return 'hsl(' + (h % 360) + ',55%,52%)';
  }

  function renderCatDonut(catCounts, cats, total) {
    if (!total || cats.length < 1) return '';
    if (cats.length === 1) {
      // Single category — just show a solid ring
      var c1 = catColor(cats[0]);
      return '<div style="width:148px;height:148px;border-radius:50%;border:12px solid ' + c1 + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
             '<span style="font-size:1.5rem;font-weight:800;color:var(--ink)">' + total + '</span>' +
             '</div>';
    }
    var W = 148, H = 148, cx = 74, cy = 74, ro = 62, ri = 42;
    var p = ['<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:' + W + 'px;height:' + H + 'px;flex-shrink:0;display:block">'];
    var angle = -Math.PI / 2;
    cats.slice(0, 8).forEach(function (cat) {
      var n = catCounts[cat];
      var sweep = (n / total) * 2 * Math.PI;
      if (sweep < 0.025) { angle += sweep; return; }
      var end = angle + sweep, laf = sweep > Math.PI ? 1 : 0;
      var col = catColor(cat);
      var x1 = cx + ro * Math.cos(angle), y1 = cy + ro * Math.sin(angle);
      var x2 = cx + ro * Math.cos(end),   y2 = cy + ro * Math.sin(end);
      var x3 = cx + ri * Math.cos(end),   y3 = cy + ri * Math.sin(end);
      var x4 = cx + ri * Math.cos(angle), y4 = cy + ri * Math.sin(angle);
      var d = 'M'+x1.toFixed(1)+' '+y1.toFixed(1)+
              ' A '+ro+' '+ro+' 0 '+laf+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)+
              ' L '+x3.toFixed(1)+' '+y3.toFixed(1)+
              ' A '+ri+' '+ri+' 0 '+laf+' 0 '+x4.toFixed(1)+' '+y4.toFixed(1)+'Z';
      p.push('<path d="' + d + '" fill="' + col + '" stroke="var(--surface)" stroke-width="2"/>');
      angle = end;
    });
    p.push('<text x="' + cx + '" y="' + (cy - 5) + '" text-anchor="middle" font-size="19" font-weight="800" fill="var(--ink)">' + total + '</text>');
    p.push('<text x="' + cx + '" y="' + (cy + 12) + '" text-anchor="middle" font-size="8" letter-spacing=".06em" fill="var(--ink-faint)">LABELS</text>');
    p.push('</svg>');
    return p.join('');
  }

  function render(p) {
    var band = String(p.verdict || "clean").toLowerCase();
    var icon = BAND_ICON[band] || "•";
    var score = p.risk_score != null ? Number(p.risk_score) : 0;
    var pct = Math.min(100, Math.round(score / 10 * 100));

    // ── Verdict hero ──────────────────────────────────────────────────────
    var ringCls = score >= 8 ? "r-crit" : score >= 4 ? "r-high" : "r-ok";
    var h = '<div class="verdict-hero v-' + esc(band) + '">';
    h += '<div class="score-ring ' + ringCls + '" style="--score:' + score + '">' +
         '<div class="ring-inner">' + esc(p.risk_score != null ? String(p.risk_score) : icon) + '</div>' +
         '</div>';
    h += '<div class="vh-body">';
    h += '<div class="vh-label">' + esc(p.risk_band || band.toUpperCase()) + '</div>';
    h += '<div class="vh-sub">Risk score <strong>' + esc(p.risk_score) + '</strong>/10 &nbsp;·&nbsp; ' + esc(p.chain) + '</div>';
    h += '<div class="vh-bar"><div class="vh-bar-fill" style="--tw:' + pct + '%"></div></div>';
    h += '</div></div>';

    // ── Address + tags ────────────────────────────────────────────────────
    h += '<div class="addr-panel">';
    var exUrl = explorerUrl(p.chain, p.address);
    var graphUrl = '/v1/operator-graph?address=' + encodeURIComponent(p.address) + '&chain=' + encodeURIComponent(p.chain);
    h += '<div class="addr-row">';
    h += (window.RC && window.RC.chainChip ? window.RC.chainChip(p.chain) : '<span class="chain-chip">' + esc(p.chain) + '</span>');
    h += '<div class="mono" style="flex:1;font-size:.85rem">' + esc(p.address) + '</div>';
    if (exUrl) {
      h += '<a href="' + esc(exUrl) + '" target="_blank" rel="noopener" style="font-size:.72rem;color:var(--accent);text-decoration:none;white-space:nowrap;border:1px solid var(--accent-soft);border-radius:var(--r-sm);padding:.12rem .42rem;flex-shrink:0" title="View on block explorer">&#128279; Explorer</a>';
    }
    h += '<a href="' + esc(graphUrl) + '" target="_blank" style="font-size:.72rem;color:var(--ink-soft);text-decoration:none;white-space:nowrap;border:1px solid var(--hair);border-radius:var(--r-sm);padding:.12rem .42rem;flex-shrink:0" title="Trace in operator graph">&#128200; Trace</a>';
    h += '</div>';
    if ((p.exposure_tags || []).length) {
      h += '<div class="tags" style="margin-top:.65rem">';
      p.exposure_tags.forEach(function (t, idx) {
        var icon = TAG_ICONS[t] || '&#9888;';
        h += '<span style="animation-delay:' + (idx * 80) + 'ms">' + icon + ' ' + esc(t) + '</span>';
      });
      h += '</div>';
    }
    if (p.note) {
      h += '<div class="note-callout">' + esc(p.note) + '</div>';
    }
    h += '</div>';

    // ── Label hits ────────────────────────────────────────────────────────
    var labels = p.labels || [];
    if (labels.length) {
      // Category breakdown mini-chart
      var catCounts = {}, sevCounts = {};
      labels.forEach(function (l) {
        var c = l.category || "unknown";
        catCounts[c] = (catCounts[c] || 0) + 1;
        var s = l.severity || "low";
        sevCounts[s] = (sevCounts[s] || 0) + 1;
      });
      var cats = Object.keys(catCounts).sort(function (a, b) { return catCounts[b] - catCounts[a]; });
      var maxVal = cats.reduce(function (m, k) { return Math.max(m, catCounts[k]); }, 1);
      var SEV_CLS = { critical: "crit", high: "warn", medium: "warn", low: "ok" };

      h += '<h2>Label hits <span style="color:var(--ink-faint);font-weight:500;font-size:.85rem">(' + esc(p.label_count) + ')</span></h2>';

      // Category donut + legend
      h += '<div style="display:flex;flex-wrap:wrap;gap:1.1rem;align-items:center;margin-bottom:1rem">';
      h += renderCatDonut(catCounts, cats, labels.length);
      h += '<div style="display:flex;flex-direction:column;justify-content:center;gap:.3rem;min-width:120px;flex:1">';
      cats.slice(0, 8).forEach(function (cat) {
        var n = catCounts[cat];
        var pct = Math.round(n / labels.length * 100);
        var c = catColor(cat);
        h += '<div style="display:flex;align-items:center;gap:.42rem;min-width:0">' +
             '<span style="width:9px;height:9px;border-radius:2px;flex-shrink:0;background:' + c + '"></span>' +
             '<span style="font-size:.72rem;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">' + esc(cat) + '</span>' +
             '<span style="font-size:.68rem;color:var(--ink-faint);font-variant-numeric:tabular-nums;flex-shrink:0;white-space:nowrap">' + n + ' &middot; ' + pct + '%</span>' +
             '</div>';
      });
      h += '</div></div>';

      // Severity breakdown
      var sevOrder = ["critical", "high", "medium", "low"];
      var SEV_FILL = { critical: "crit", high: "warn", medium: "warn", low: "ok" };
      var maxSev = sevOrder.reduce(function (m, s) { return Math.max(m, sevCounts[s] || 0); }, 1);
      h += '<div style="display:flex;flex-wrap:wrap;gap:.55rem .8rem;align-items:center;margin-bottom:1rem">';
      sevOrder.forEach(function (sev) {
        var n = sevCounts[sev] || 0;
        if (!n) return;
        var fc = SEV_FILL[sev] || "";
        var barPct = Math.round(n / maxSev * 100);
        h += '<div style="display:flex;align-items:center;gap:.45rem">' +
             '<span style="width:56px;font-size:.72rem;color:var(--ink-soft)">' + esc(sev) + '</span>' +
             '<span class="pbar" style="width:60px"><span class="pbar-fill ' + fc + '" style="width:' + barPct + '%"></span></span>' +
             '<span style="font-size:.68rem;color:var(--ink-faint);font-variant-numeric:tabular-nums">' + esc(n) + '</span>' +
             '</div>';
      });
      h += '</div>';

      h += '<table><thead><tr><th>Name</th><th>Category</th><th>Severity</th><th>Confidence</th><th>Source</th></tr></thead><tbody>';
      labels.forEach(function (l) {
        h += '<tr><td>' + esc(l.name) + '</td><td class="mono">' + esc(l.category) + '</td>' +
             '<td>' + esc(l.severity) + '</td>' +
             '<td style="vertical-align:middle">' + confCell(l.confidence) + '</td>' +
             '<td>' + esc(l.source) + '</td></tr>';
      });
      h += '</tbody></table>';
    }

    // ── Sighting history — metric cards + risk indicator strip ────────────
    var c = p.sighting_history || {};
    var priorCases = c.prior_case_count || 0;
    var ofacExp    = c.prior_ofac_exposed_count || 0;
    var mixExp     = c.prior_mixer_exposed_count || 0;
    var drainAttr  = c.prior_drainer_attributed_count || 0;
    h += '<h2>Cross-case sighting history</h2>';
    h += '<div class="cards" style="margin-top:.5rem">';
    h += card(priorCases,  "Prior cases",      priorCases  ? "alert" : "");
    h += card(ofacExp,     "OFAC-exposed",     ofacExp     ? "alert" : "");
    h += card(mixExp,      "Mixer-exposed",    mixExp      ? "alert" : "");
    h += card(drainAttr,   "Drainer-attr.",    drainAttr   ? "alert" : "");
    h += card(c.prior_total_usd_flowed || "—", "Total USD seen");
    h += '</div>';
    // Risk indicator strip — TRM-style horizontal bars
    var _indicators = [
      { label: "OFAC exposure", val: ofacExp, color: "crit" },
      { label: "Mixer exposure", val: mixExp, color: "warn" },
      { label: "Drainer attribution", val: drainAttr, color: "crit" },
      { label: "Prior cases", val: priorCases, color: "warn" }
    ];
    var _maxInd = _indicators.reduce(function(m, d) { return Math.max(m, d.val); }, 1);
    if (_indicators.some(function(d) { return d.val > 0; })) {
      h += '<div style="background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:.85rem 1.1rem;box-shadow:var(--shadow-sm);margin-top:.75rem">';
      h += '<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);margin-bottom:.65rem">Risk indicators</div>';
      _indicators.forEach(function(ind) {
        var pct = Math.round(ind.val / _maxInd * 100);
        h += '<div style="display:flex;align-items:center;gap:.65rem;margin-bottom:.45rem">' +
             '<span style="width:130px;font-size:.74rem;color:var(--ink-soft);flex-shrink:0">' + esc(ind.label) + '</span>' +
             '<span class="pbar" style="flex:1;height:5px"><span class="pbar-fill ' + ind.color + '" style="width:' + pct + '%"></span></span>' +
             '<span style="width:28px;text-align:right;font-size:.72rem;font-variant-numeric:tabular-nums;color:var(--ink-faint)">' + esc(ind.val) + '</span>' +
             '</div>';
      });
      h += '</div>';
    }

    // ── Investigator note ─────────────────────────────────────────────────
    if (p.investigator_note) {
      h += '<h2>Investigator note</h2>';
      h += '<div class="inv-note">' + esc(p.investigator_note) + '</div>';
    }

    h += '<p class="sub" style="margin-top:1.2rem">Sources: ' + esc((p.data_sources_used || []).join(", ")) + '</p>';
    $("out").innerHTML = h;
  }

  function go() {
    var k = key(); if (!k) { setMsg("Enter the admin key.", "err"); return; }
    var a = ($("addr").value || "").trim(); if (!a) { setMsg("Enter an address.", "err"); return; }
    try { sessionStorage.setItem("rk_admin_key", k); } catch (e) {}
    setMsg("Screening…"); $("go").disabled = true;
    // Show skeleton immediately so the UI doesn't feel frozen
    if (window.RC) {
      $("out").innerHTML = '<div class="cards" style="margin-bottom:.8rem">' + window.RC.skeletonCards(3) + '</div>' + window.RC.skeletonTable(4, 5);
    }
    var url = "/v1/address/profile?address=" + encodeURIComponent(a) + "&chain=" + encodeURIComponent($("chain").value);
    fetch(url, { headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) {
        if (res.status === 401) throw new Error("Unauthorized — check the key.");
        if (res.status === 503) throw new Error("API not configured (set RECUPERO_ADMIN_KEY).");
        if (res.status === 400) throw new Error("Bad address.");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (p) {
        render(p);
        if (window.RC) {
          window.RC.animateGauges($("out"));
          window.RC.animateRings($("out"));
          window.RC.staggerRows($("out"));
          window.RC.attachSort($("out"));
          window.RC.attachFilter($("out"));
          $("out").querySelectorAll(".card .v").forEach(window.RC.countUp);
          window.RC.toast("Profile loaded ✓", "ok");
        }
        setMsg("Screened " + new Date().toLocaleTimeString(), "ok");
      })
      .catch(function (e) {
        setMsg(e.message, "err");
        if (window.RC) { window.RC.toast(e.message, "err"); }
      })
      .finally(function () { $("go").disabled = false; });
  }

  $("go").addEventListener("click", go);
  $("addr").addEventListener("keydown", function (e) { if (e.key === "Enter") go(); });

  // Deep-link support: ?address=0x…&chain=ethereum pre-fills + auto-screens
  (function () {
    try {
      var _qs = new URLSearchParams(window.location.search);
      var _addr = _qs.get("address");
      if (_addr) { $("addr").value = _addr; }
      var _chain = _qs.get("chain");
      if (_chain && $("chain")) { $("chain").value = _chain; }
      if (_addr && $("key") && $("key").value) { go(); }
    } catch (e) {}
  })();
})();
</script>
<script src="/v1/console/app.js" defer></script>
</body>
</html>
