<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recupero — Address Profile</title>
<link rel="stylesheet" href="/v1/console/app.css">
<style>
  /* page-specific: address profile */
  .tags span {
    display: inline-flex; align-items: center; gap: .3rem;
    background: var(--crit-soft); color: var(--crit); border-radius: 999px;
    padding: .18rem .65rem; margin: 0 .3rem .3rem 0; font-size: .78rem; font-weight: 700;
    border: 1px solid var(--crit-border);
  }
  .conf-high   { color: var(--crit); font-weight: 700; }
  .conf-medium { color: var(--warn); font-weight: 600; }
  .conf-low    { color: var(--ink-soft); }
  .note-callout {
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: .5rem .8rem;
    font-size: .82rem; margin-top: .6rem; color: var(--ink-soft);
  }
  .inv-note {
    background: var(--warn-soft); border-left: 3px solid var(--warn);
    border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: .55rem .8rem;
    font-size: .82rem; font-style: italic;
  }
  .addr-panel {
    background: var(--surface); border: 1px solid var(--hair); border-radius: var(--r);
    padding: .85rem 1.1rem; box-shadow: var(--shadow-sm); margin-top: .8rem;
  }
  .addr-row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
  .chain-chip {
    display: inline-block; padding: .1rem .5rem; border-radius: 999px; font-size: .68rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    background: var(--surface-2); border: 1px solid var(--hair); color: var(--ink-soft);
  }
</style>
</head>
<body>
  <h1>🔎 Address Profile</h1>
  <div class="sub">Type any address to screen it against OFAC + mixer + ransomware + drainer seeds and the
    cross-case index. Paste your operator key; data is fetched from the admin-gated API (the key stays in a
    request header, never the URL).</div>

  <div class="bar">
    <input id="key" type="password" placeholder="X-Recupero-Admin-Key" size="30" autocomplete="off">
    <input id="addr" type="text" placeholder="address (0x… / T… / base58)" size="44" autocomplete="off">
    <select id="chain">
      <option>ethereum</option><option>arbitrum</option><option>base</option><option>optimism</option>
      <option>bsc</option><option>polygon</option><option>avalanche</option><option>tron</option>
      <option>solana</option><option>bitcoin</option>
    </select>
    <button id="go">Screen</button>
    <span id="msg"></span>
  </div>

  <div id="out"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  try { $("key").value = sessionStorage.getItem("rk_admin_key") || ""; } catch (e) {}
  function setMsg(t, cls) { var m = $("msg"); m.textContent = t || ""; m.className = cls || ""; }
  function key() { return ($("key").value || "").trim(); }

  var BAND_ICON = { sanctioned: "⛔", high: "🔴", medium: "🟠", low: "🟡", clean: "✅" };

  function card(v, l, cls) {
    return '<div class="card ' + (cls || "") + '"><div class="v">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>';
  }

  function render(p) {
    var band = String(p.verdict || "clean").toLowerCase();
    var icon = BAND_ICON[band] || "•";
    var score = p.risk_score != null ? Number(p.risk_score) : 0;
    var pct = Math.min(100, Math.round(score / 10 * 100));

    // ── Verdict hero ──────────────────────────────────────────────────────
    var h = '<div class="verdict-hero v-' + esc(band) + '">';
    h += '<div class="vh-icon">' + icon + '</div>';
    h += '<div class="vh-body">';
    h += '<div class="vh-label">' + esc(p.risk_band || band.toUpperCase()) + '</div>';
    h += '<div class="vh-sub">Risk score <strong>' + esc(p.risk_score) + '</strong>/10 &nbsp;·&nbsp; ' + esc(p.chain) + '</div>';
    h += '<div class="vh-bar"><div class="vh-bar-fill" style="--tw:' + pct + '%"></div></div>';
    h += '</div></div>';

    // ── Address + tags ────────────────────────────────────────────────────
    h += '<div class="addr-panel">';
    h += '<div class="addr-row">';
    h += '<span class="chain-chip">' + esc(p.chain) + '</span>';
    h += '<div class="mono" style="flex:1;font-size:.85rem">' + esc(p.address) + '</div>';
    h += '</div>';
    if ((p.exposure_tags || []).length) {
      h += '<div class="tags" style="margin-top:.65rem">';
      p.exposure_tags.forEach(function (t) { h += '<span>' + esc(t) + '</span>'; });
      h += '</div>';
    }
    if (p.note) {
      h += '<div class="note-callout">' + esc(p.note) + '</div>';
    }
    h += '</div>';

    // ── Label hits ────────────────────────────────────────────────────────
    var labels = p.labels || [];
    if (labels.length) {
      h += '<h2>Label hits <span style="color:var(--ink-faint);font-weight:500;font-size:.85rem">(' + esc(p.label_count) + ')</span></h2>';
      h += '<table><thead><tr><th>Name</th><th>Category</th><th>Severity</th><th>Confidence</th><th>Source</th></tr></thead><tbody>';
      labels.forEach(function (l) {
        h += '<tr><td>' + esc(l.name) + '</td><td class="mono">' + esc(l.category) + '</td>' +
             '<td>' + esc(l.severity) + '</td>' +
             '<td class="conf-' + esc(l.confidence) + '">' + esc(l.confidence) + '</td>' +
             '<td>' + esc(l.source) + '</td></tr>';
      });
      h += '</tbody></table>';
    }

    // ── Sighting history — metric cards ───────────────────────────────────
    var c = p.sighting_history || {};
    var priorCases = c.prior_case_count || 0;
    var ofacExp    = c.prior_ofac_exposed_count || 0;
    var mixExp     = c.prior_mixer_exposed_count || 0;
    var drainAttr  = c.prior_drainer_attributed_count || 0;
    h += '<h2>Cross-case sighting history</h2>';
    h += '<div class="cards" style="margin-top:.5rem">';
    h += card(priorCases,  "Prior cases",      priorCases  ? "alert" : "");
    h += card(ofacExp,     "OFAC-exposed",     ofacExp     ? "alert" : "");
    h += card(mixExp,      "Mixer-exposed",    mixExp      ? "alert" : "");
    h += card(drainAttr,   "Drainer-attr.",    drainAttr   ? "alert" : "");
    h += card(c.prior_total_usd_flowed || "—", "Total USD seen");
    h += '</div>';

    // ── Investigator note ─────────────────────────────────────────────────
    if (p.investigator_note) {
      h += '<h2>Investigator note</h2>';
      h += '<div class="inv-note">' + esc(p.investigator_note) + '</div>';
    }

    h += '<p class="sub" style="margin-top:1.2rem">Sources: ' + esc((p.data_sources_used || []).join(", ")) + '</p>';
    $("out").innerHTML = h;
  }

  function go() {
    var k = key(); if (!k) { setMsg("Enter the admin key.", "err"); return; }
    var a = ($("addr").value || "").trim(); if (!a) { setMsg("Enter an address.", "err"); return; }
    try { sessionStorage.setItem("rk_admin_key", k); } catch (e) {}
    setMsg("Screening…"); $("go").disabled = true;
    var url = "/v1/address/profile?address=" + encodeURIComponent(a) + "&chain=" + encodeURIComponent($("chain").value);
    fetch(url, { headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) {
        if (res.status === 401) throw new Error("Unauthorized — check the key.");
        if (res.status === 503) throw new Error("API not configured (set RECUPERO_ADMIN_KEY).");
        if (res.status === 400) throw new Error("Bad address.");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (p) { render(p); setMsg("Screened " + new Date().toLocaleTimeString(), "ok"); })
      .catch(function (e) { setMsg(e.message, "err"); })
      .finally(function () { $("go").disabled = false; });
  }

  $("go").addEventListener("click", go);
  $("addr").addEventListener("keydown", function (e) { if (e.key === "Enter") go(); });
})();
</script>
<script src="/v1/console/app.js" defer></script>
</body>
</html>
