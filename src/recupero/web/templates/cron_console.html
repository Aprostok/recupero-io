<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recupero &#8212; Cron / Job Health</title>
<link rel="stylesheet" href="/v1/console/app.css">
<style>
  /* page-specific: cron / job health */
  .card.alert .v { color: var(--crit); } .card.ok .v { color: var(--ok); }
  tr.bad td { background: var(--crit-soft); }
  .errmsg { font-family: var(--mono); font-size: .72rem; color: var(--crit); white-space: pre-wrap; word-break: break-word; max-width: 38rem; }
  .badge.down  { background: var(--crit-soft); color: var(--crit); }
  .badge.stale { background: var(--warn-soft); color: var(--warn); }
  .badge.ok    { background: rgba(29,138,78,.12); color: var(--ok); }
  label.autolabel { display: inline-flex; align-items: center; gap: .35rem; font-size: .8rem; color: var(--ink-soft); cursor: pointer; user-select: none; }
  label.autolabel input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  td.hrs-crit { color: var(--crit); font-weight: 700; }
  td.hrs-warn { color: var(--warn); font-weight: 600; }
  td.hrs-ok   { color: var(--ok); }
  /* freshness cell */
  .fresh-wrap { display: flex; align-items: center; gap: .45rem; justify-content: flex-end; }
  .fresh-val  { font-variant-numeric: tabular-nums; white-space: nowrap; }
  /* health overview strip */
  .health-strip {
    display: flex; gap: .6rem; align-items: center; flex-wrap: wrap;
    padding: .55rem .9rem; background: var(--surface); border: 1px solid var(--hair);
    border-radius: var(--r); box-shadow: var(--shadow-sm); margin-bottom: .9rem;
    animation: rc-rise .4s cubic-bezier(.32,.72,0,1) both; display: none;
  }
  .health-strip-item { display: flex; align-items: center; gap: .38rem; font-size: .78rem; }
  .health-strip-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
  <h1>&#9881;&#65039; Cron / Job Health</h1>
  <div class="sub">Live health of every scheduled background job. Paste your operator key to load;
    data is fetched directly from the admin-gated <code>/v1/cron/jobs</code> API (the key stays in a
    request header, never the URL). Failed or stale jobs are flagged red.</div>

  <div class="bar">
    <input id="key" type="password" placeholder="X-Recupero-Admin-Key" size="34" autocomplete="off">
    <button id="load">Load</button>
    <label class="autolabel"><input type="checkbox" id="auto"> auto-refresh 60s</label>
    <span class="live-dot" id="live-dot" style="display:none"></span>
    <span id="msg"></span>
  </div>

  <div class="cards" id="cards"></div>
  <div id="health-strip" class="health-strip"></div>
  <div id="tablewrap"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  // Persist the key for the session only (not localStorage) &#8212; clears on tab close.
  try { $("key").value = sessionStorage.getItem("rk_admin_key") || ""; } catch (e) {}

  function setMsg(t, cls) { var m = $("msg"); m.textContent = t || ""; m.className = cls || ""; }

  function card(v, l, cls) { return '<div class="card ' + (cls||"") + '"><div class="v">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  function statusBadge(st) {
    var cls = (st === "ok") ? "ok" : (st === "stale") ? "stale" : "down";
    return '<span class="badge ' + cls + '">' + esc(st || "?") + '</span>';
  }

  function hrsCell(h) {
    if (h == null) return '<td class="right"><span style="color:var(--ink-faint)">&#8212;</span></td>';
    var n = Number(h);
    var textCls  = n > 48 ? "hrs-crit" : n > 24 ? "hrs-warn" : "hrs-ok";
    var barCls   = n > 48 ? "crit"     : n > 24 ? "warn"     : "ok";
    var barPct   = Math.min(100, Math.round(n / 72 * 100)); // 72h = full red
    return '<td class="right ' + textCls + '">' +
           '<div class="fresh-wrap">' +
           '<span class="pbar" style="width:40px"><span class="pbar-fill ' + barCls + '" style="width:' + barPct + '%"></span></span>' +
           '<span class="fresh-val">' + esc(n.toFixed(1)) + 'h</span>' +
           '</div></td>';
  }

  function render(payload) {
    var jobs = (payload && payload.jobs) || {};
    var names = Object.keys(jobs);
    var nDown = 0, nStale = 0, nOk = 0;
    names.forEach(function (n) {
      var st = jobs[n] && jobs[n].status;
      if (st === "down") { nDown++; } else if (st === "stale") { nStale++; } else { nOk++; }
    });
    var healthPct = names.length ? Math.round(nOk / names.length * 100) : 100;
    var healthCls = healthPct < 60 ? "alert" : healthPct < 90 ? "" : "ok";

    $("cards").innerHTML =
      card(healthPct + "%", "Health", healthCls) +
      card(names.length, "Jobs", "") +
      card(nOk, "Healthy", nOk && !nDown ? "ok" : "") +
      card(nStale, "Stale", nStale ? "alert" : "") +
      card(nDown, "Down", nDown ? "alert" : "");

    // Health overview strip
    var hs = $("health-strip");
    if (hs && names.length > 0) {
      var ringCls = nDown ? "r-crit" : nStale ? "r-high" : "r-ok";
      var ringScore = (healthPct / 10).toFixed(1);
      var strip = '<span class="score-ring sm ' + ringCls + '" style="--score:' + ringScore + '">' +
                  '<span class="ring-inner">' + healthPct + '</span></span>';
      var segs = [
        { n: nOk,    color: "var(--ok)",   label: "Healthy" },
        { n: nStale, color: "var(--warn)",  label: "Stale" },
        { n: nDown,  color: "var(--crit)", label: "Down" }
      ];
      segs.forEach(function(s) {
        if (!s.n) return;
        strip += '<div class="health-strip-item">' +
                 '<span class="health-strip-dot" style="background:' + s.color + '"></span>' +
                 '<span>' + esc(s.n) + ' ' + s.label + '</span>' +
                 '</div>';
      });
      hs.innerHTML = strip;
      hs.style.display = "flex";
      if (window.RC && window.RC.animateRings) { window.RC.animateRings(hs); }
    }

    if (!names.length) { $("tablewrap").innerHTML = '<p class="sub">No jobs reported.</p>'; return; }
    var h = '<table><thead><tr>' +
            '<th>Job</th><th>Status</th><th>Last success</th>' +
            '<th class="right">Hrs since</th><th class="right">Fails</th>' +
            '<th>Last error</th></tr></thead><tbody>';
    names.forEach(function (n) {
      var j = jobs[n] || {};
      var bad = (j.status === "down" || j.status === "stale");
      h += '<tr class="' + (bad ? "bad" : "") + '">' +
        '<td class="mono">' + esc(n) + '</td>' +
        '<td>' + statusBadge(j.status) + '</td>' +
        '<td class="mono age" title="' + esc(j.last_success_utc != null ? j.last_success_utc : '') + '">' + (j.last_success_utc != null ? window.RC.timeAgo(j.last_success_utc) : '&#8212;') + '</td>' +
        hrsCell(j.hours_since_last_success) +
        '<td class="right">' + esc(j.consecutive_failures != null ? j.consecutive_failures : "&#8212;") + '</td>' +
        '<td class="errmsg">' + esc(j.last_error_message != null ? j.last_error_message : "") + '</td>' +
        '</tr>';
    });
    h += '</tbody></table>';
    $("tablewrap").innerHTML = h;
    if (window.RC) {
      window.RC.staggerRows($("tablewrap"));
      window.RC.attachSort($("tablewrap"));
      window.RC.attachFilter($("tablewrap"));
      window.RC.animateGauges($("tablewrap"));
      window.RC.countUp($("cards"));
    }
  }

  function key() { return ($("key").value || "").trim(); }

  function load() {
    var k = key();
    if (!k) { setMsg("Enter the admin key.", "err"); return; }
    try { sessionStorage.setItem("rk_admin_key", k); } catch (e) {}
    setMsg("Loading&#8230;");
    fetch("/v1/cron/jobs", { headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) {
        if (res.status === 401) throw new Error("Unauthorized &#8212; check the key.");
        if (res.status === 503) throw new Error("API not configured (set RECUPERO_ADMIN_KEY).");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (payload) {
        render(payload);
        setMsg("Updated " + new Date().toLocaleTimeString(), "ok");
        if (window.RC) { window.RC.toast("Job health loaded &#10003;", "ok"); }
      })
      .catch(function (e) {
        setMsg(e.message, "err");
        if (window.RC) { window.RC.toast(e.message, "err"); }
      });
  }

  var timer = null;
  $("load").addEventListener("click", load);
  $("auto").addEventListener("change", function () {
    if (timer) { clearInterval(timer); timer = null; }
    $("live-dot").style.display = "none";
    if (this.checked) {
      timer = setInterval(load, 60000);
      $("live-dot").style.display = "inline-block";
      setMsg("Live &middot; auto-refresh on", "ok");
    }
  });
  if (key()) { load(); }
})();
</script>
<script src="/v1/console/app.js" defer></script>
</body>
</html>
