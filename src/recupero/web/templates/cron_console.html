<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recupero — Cron / Job Health</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         margin: 0; padding: 0 1.25rem 3rem; color: #1a1a1a; background: #fafafa; }
  h1 { font-size: 1.4rem; margin: 1rem 0 0.2rem; }
  .sub { color: #666; font-size: 0.82rem; margin-bottom: 1rem; }
  .bar { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin-bottom: 1rem; }
  input[type=password], input[type=text] { padding: .4rem .6rem; border: 1px solid #ccc; border-radius: 6px; font-size: .85rem; }
  button { padding: .4rem .8rem; border: 1px solid #2563eb; background: #2563eb; color: #fff; border-radius: 6px; cursor: pointer; font-size: .85rem; }
  button.secondary { background: #fff; color: #2563eb; }
  button:disabled { opacity: .5; cursor: default; }
  .cards { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 1rem; }
  .card { background: #fff; border: 1px solid #e3e3e3; border-radius: 10px; padding: .7rem 1rem; min-width: 130px; }
  .card .v { font-size: 1.3rem; font-weight: 700; } .card .l { font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: #888; }
  .card.alert .v { color: #c0392b; } .card.ok .v { color: #1e8449; }
  table { width: 100%; border-collapse: collapse; background: #fff; font-size: .8rem; border: 1px solid #e3e3e3; border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: .45rem .6rem; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  th { background: #f5f5f5; font-size: .68rem; text-transform: uppercase; color: #777; }
  tr.bad td { background: #fdf3f2; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .76rem; }
  .errmsg { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .72rem; color: #a93226; white-space: pre-wrap; word-break: break-word; max-width: 38rem; }
  .badge { display:inline-block; padding:.08rem .4rem; border-radius:6px; font-size:.7rem; font-weight:600; }
  .badge.down { background:#f9e0dd; color:#a93226; } .badge.stale { background:#fdebd0; color:#9c640c; } .badge.ok { background:#e3f3e8; color:#1e8449; }
  .right { text-align: right; } #msg { font-size: .8rem; margin-left: .5rem; }
  .err { color: #c0392b; } .ok { color: #1e8449; }
</style>
</head>
<body>
  <h1>⚙️ Cron / Job Health</h1>
  <div class="sub">Live health of every scheduled background job. Paste your operator key to load;
    data is fetched directly from the admin-gated <code>/v1/cron/jobs</code> API (the key stays in a
    request header, never the URL). Failed or stale jobs are flagged red.</div>

  <div class="bar">
    <input id="key" type="password" placeholder="X-Recupero-Admin-Key" size="34" autocomplete="off">
    <button id="load">Load</button>
    <label class="sub"><input type="checkbox" id="auto"> auto-refresh 60s</label>
    <span id="msg"></span>
  </div>

  <div class="cards" id="cards"></div>
  <div id="tablewrap"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML; }
  // Persist the key for the session only (not localStorage) — clears on tab close.
  try { $("key").value = sessionStorage.getItem("rk_admin_key") || ""; } catch (e) {}

  function setMsg(t, cls) { var m = $("msg"); m.textContent = t || ""; m.className = cls || ""; }

  function card(v, l, cls) { return '<div class="card ' + (cls||"") + '"><div class="v">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  function statusBadge(st) {
    var cls = (st === "ok") ? "ok" : (st === "stale") ? "stale" : "down";
    return '<span class="badge ' + cls + '">' + esc(st || "?") + '</span>';
  }

  function render(payload) {
    var jobs = (payload && payload.jobs) || {};
    var names = Object.keys(jobs);
    var nDown = 0, nStale = 0, nOk = 0;
    names.forEach(function (n) {
      var st = jobs[n] && jobs[n].status;
      if (st === "down") { nDown++; } else if (st === "stale") { nStale++; } else { nOk++; }
    });

    $("cards").innerHTML =
      card(payload && payload.status, "Overall", (payload && payload.status === "ok") ? "ok" : "alert") +
      card(names.length, "Jobs") +
      card(nOk, "Healthy", nOk ? "ok" : "") +
      card(nStale, "Stale", nStale ? "alert" : "") +
      card(nDown, "Down", nDown ? "alert" : "");

    if (!names.length) { $("tablewrap").innerHTML = '<p class="sub">No jobs reported.</p>'; return; }
    var h = '<table><thead><tr>' +
            '<th>Job</th><th>Status</th><th>Last success</th>' +
            '<th class="right">Hrs since</th><th class="right">Fails</th>' +
            '<th>Last error</th></tr></thead><tbody>';
    names.forEach(function (n) {
      var j = jobs[n] || {};
      var bad = (j.status === "down" || j.status === "stale");
      h += '<tr class="' + (bad ? "bad" : "") + '">' +
        '<td class="mono">' + esc(n) + '</td>' +
        '<td>' + statusBadge(j.status) + '</td>' +
        '<td class="mono">' + esc(j.last_success_utc != null ? j.last_success_utc : "—") + '</td>' +
        '<td class="right">' + esc(j.hours_since_last_success != null ? j.hours_since_last_success : "—") + '</td>' +
        '<td class="right">' + esc(j.consecutive_failures != null ? j.consecutive_failures : "—") + '</td>' +
        '<td class="errmsg">' + esc(j.last_error_message != null ? j.last_error_message : "") + '</td>' +
        '</tr>';
    });
    h += '</tbody></table>';
    $("tablewrap").innerHTML = h;
  }

  function key() { return ($("key").value || "").trim(); }

  function load() {
    var k = key();
    if (!k) { setMsg("Enter the admin key.", "err"); return; }
    try { sessionStorage.setItem("rk_admin_key", k); } catch (e) {}
    setMsg("Loading…");
    fetch("/v1/cron/jobs", { headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) {
        if (res.status === 401) throw new Error("Unauthorized — check the key.");
        if (res.status === 503) throw new Error("API not configured (set RECUPERO_ADMIN_KEY).");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (payload) { render(payload); setMsg("Updated " + new Date().toLocaleTimeString(), "ok"); })
      .catch(function (e) { setMsg(e.message, "err"); });
  }

  var timer = null;
  $("load").addEventListener("click", load);
  $("auto").addEventListener("change", function () {
    if (timer) { clearInterval(timer); timer = null; }
    if (this.checked) { timer = setInterval(load, 60000); }
  });
  if (key()) { load(); }
})();
</script>
</body>
</html>
