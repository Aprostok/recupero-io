<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recupero &#8211; Label Freshness</title>
<link rel="stylesheet" href="/v1/console/app.css">
<style>
  /* page-specific: label-freshness alarms */
  .card.alert .v { color: var(--crit); } .card.ok .v { color: var(--ok); }
  tr.critical td { background: var(--crit-soft); }
  tr.stale    td { background: var(--warn-soft); }
  tr.unknown  td { background: var(--surface-2); }
  .badge.stale   { background: var(--warn-soft); color: var(--warn); }
  .badge.unknown { background: var(--surface-2); color: var(--ink-soft); }
  .badge.fresh   { background: rgba(29,138,78,.12); color: var(--ok); }
  .badge.critical { background: var(--crit-soft); color: var(--crit); }
  /* age bar */
  td.age-cell { white-space: nowrap; }
</style>
</head>
<body>
  <h1>&#128336; Label Freshness</h1>
  <div class="sub">Per-source label freshness vs SLA, with the OFAC feed as the headline alarm. Paste your
    operator key to load; data is fetched directly from the admin-gated API (the key stays in a request
    header, never the URL).</div>

  <div class="bar">
    <input id="key" type="password" placeholder="X-Recupero-Admin-Key" size="34" autocomplete="off">
    <button id="load">Load</button>
    <span id="msg"></span>
  </div>

  <div id="alarm"></div>
  <div class="cards" id="cards"></div>
  <div id="tablewrap"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  // Persist the key for the session only (not localStorage) -- clears on tab close.
  try { $("key").value = sessionStorage.getItem("rk_admin_key") || ""; } catch (e) {}

  function setMsg(t, cls) { var m = $("msg"); m.textContent = t || ""; m.className = cls || ""; }

  function card(v, l, cls) { return '<div class="card ' + (cls||"") + '"><div class="v">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  // Freshness age bar: age / sla capped at 200% for visual range
  function ageBarCell(ageDays, slaDays) {
    if (ageDays == null || slaDays == null || slaDays <= 0) return '<td class="right age-cell">&#8212;</td>';
    var pct = Math.min(200, Math.round(ageDays / slaDays * 100));
    var barPct = Math.min(100, pct);
    var cls = pct >= 100 ? "crit" : pct >= 70 ? "warn" : "ok";
    // Use pbar for the bar visualization
    return '<td class="right age-cell" style="white-space:nowrap">' +
      '<span class="pbar"><span class="pbar-fill ' + cls + '" style="width:' + barPct + '%"></span></span>&nbsp;' +
      esc(ageDays) + 'd</td>';
  }

  function render(rep) {
    var sum = rep.summary || {};
    // OFAC feed-age headline alarm -- uses shared .ai-disclaimer layout
    var ofacStatus = sum.ofac_status || "unknown";
    var ofacAge = (sum.ofac_age_days == null) ? "unknown" : (sum.ofac_age_days + "d");
    var isBad = (ofacStatus === "critical" || ofacStatus === "stale");
    var alarmIcon = ofacStatus === "critical" ? "&#128308;" : ofacStatus === "stale" ? "&#128992;" : ofacStatus === "fresh" ? "&#128994;" : "&#9898;";
    $("alarm").innerHTML = '<div class="ai-disclaimer" style="' +
      (ofacStatus === "critical" ? "background:var(--crit-soft);border-color:var(--crit-border)" :
       ofacStatus === "stale"    ? "background:var(--warn-soft);border-color:var(--warn-border)" :
       ofacStatus === "fresh"    ? "background:var(--ok-soft);border-color:var(--ok-border)" :
       "") + '">' +
      '<div class="ai-disclaimer-icon">' + alarmIcon + '</div>' +
      '<div class="ai-disclaimer-body">' +
        '<div class="ai-disclaimer-title" style="' +
          (ofacStatus === "critical" ? "color:var(--crit)" :
           ofacStatus === "stale"    ? "color:var(--warn)" :
           ofacStatus === "fresh"    ? "color:var(--ok)"   : "color:var(--ink-soft)") + '">' +
          'OFAC feed: ' + esc(ofacStatus.toUpperCase()) +
        '</div>' +
        '<div class="ai-disclaimer-note">Feed age: <b>' + esc(ofacAge) + '</b>' +
          (isBad ? ' &nbsp;&mdash;&nbsp; re-run <code>recupero ofac-sync</code> to refresh the sanctions dataset.' : '') +
        '</div>' +
      '</div>' +
    '</div>';

    $("cards").innerHTML =
      card(sum.total,    "Sources",  "") +
      card(sum.critical, "Critical", sum.critical ? "alert" : "") +
      card(sum.stale,    "Stale",    sum.stale    ? "alert" : "") +
      card(sum.unknown,  "Unknown",  sum.unknown  ? "alert" : "") +
      card(sum.fresh,    "Fresh",    "ok");
    if (window.RC) { window.RC.countUp($("cards")); }

    var rows = rep.sources || [];
    if (!rows.length) { $("tablewrap").innerHTML = '<p class="sub">No label sources reported.</p>'; return; }
    var h = '<table><thead><tr><th>Source</th><th>Class</th><th>Status</th>' +
            '<th class="right">Age vs SLA</th><th class="right">SLA (days)</th><th>Message</th>' +
            '</tr></thead><tbody>';
    rows.forEach(function (r) {
      var st = r.status || "unknown";
      h += '<tr class="' + esc(st) + '">' +
        '<td class="mono">' + esc(r.name) + '</td>' +
        '<td><span class="chip">' + esc(r.source_class) + '</span></td>' +
        '<td><span class="badge ' + esc(st) + '">' + esc(st) + '</span></td>' +
        ageBarCell(r.age_days, r.sla_days) +
        '<td class="right">' + esc(r.sla_days) + '</td>' +
        '<td>' + esc(r.message) + '</td>' +
        '</tr>';
    });
    h += '</tbody></table>';
    $("tablewrap").innerHTML = h;
    if (window.RC) {
      window.RC.staggerRows($("tablewrap"));
      window.RC.attachSort($("tablewrap"));
      window.RC.animateGauges($("tablewrap"));
    }
  }

  function key() { return ($("key").value || "").trim(); }

  function load() {
    var k = key();
    if (!k) { setMsg("Enter the admin key.", "err"); return; }
    try { sessionStorage.setItem("rk_admin_key", k); } catch (e) {}
    setMsg("Loading&#8230;");
    if (window.RC) {
      $("cards").innerHTML = window.RC.skeletonCards(5);
      $("tablewrap").innerHTML = window.RC.skeletonTable(4, 6);
    }
    fetch("/v1/freshness", { headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) {
        if (res.status === 401) throw new Error("Unauthorized &#8212; check the key.");
        if (res.status === 503) throw new Error("API not configured (admin key).");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (rep) {
        render(rep);
        setMsg("Updated " + new Date().toLocaleTimeString(), "ok");
        if (window.RC) { window.RC.toast("Freshness data loaded", "ok"); }
      })
      .catch(function (e) {
        setMsg(e.message, "err");
        if (window.RC) { window.RC.toast(e.message, "err"); }
      });
  }

  $("load").addEventListener("click", load);
  if (key()) { load(); }
})();
</script>
<script src="/v1/console/app.js" defer></script>
</body>
</html>
