<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<title>Operator fund-flow graph - Recupero</title>
<style>
/* -- Recupero Operator Graph - Apple-grade dark theme -- */
:root {
  --bg: #07090f;  --bg2: #0b0e17;  --surface: #131620;  --surface-2: #1a1e2e;
  --border: rgba(255,255,255,.09);  --border-hi: rgba(255,255,255,.16);
  --ink: #e8eaf0;  --ink-soft: #7d859e;  --ink-faint: #4a5166;
  --accent: #3b82f6;  --accent-glow: rgba(59,130,246,.32);  --accent-soft: rgba(59,130,246,.14);
  --green: #10b981;  --green-glow: rgba(16,185,129,.28);  --green-soft: rgba(16,185,129,.14);
  --crit: #ef4444;  --crit-glow: rgba(239,68,68,.32);
  --warn: #f59e0b;  --warn-glow: rgba(245,158,11,.28);
  --path-col: #60a5fa;  --path-glow: rgba(96,165,250,.36);
  --edge-col: #252b3e;  --edge-cross: #ea580c;
  --r: 8px;  --ease: cubic-bezier(.32,.72,0,1);
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; }
body { margin: 0; font-family: var(--font); background: var(--bg); color: var(--ink); overflow: hidden; }

/* -- Login / topbar -- */
#loginbar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 10px 18px;
  background: rgba(7,9,15,.88);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  position: relative; z-index: 20;
}
#loginbar::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--green) 70%, transparent 100%);
  opacity: .5;
}
#loginbar h1 {
  font-size: 14px; margin: 0 14px 0 0; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(130deg, #e8eaf0 30%, var(--path-col));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
#loginbar input {
  background: var(--surface); color: var(--ink); border: 1px solid var(--border);
  border-radius: var(--r); padding: 7px 11px; font-size: 13px;
  transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
}
#loginbar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
#loginbar input#inv { width: 330px; font-family: var(--mono); }
#loginbar > button {
  background: linear-gradient(135deg, var(--accent), #1d4ed8); color: #fff;
  border: 0; border-radius: var(--r); padding: 7px 17px; font-size: 13px; font-weight: 600;
  cursor: pointer; letter-spacing: -0.01em;
  box-shadow: 0 0 16px var(--accent-glow);
  transition: box-shadow .18s, transform .12s var(--ease);
}
#loginbar > button:hover { box-shadow: 0 0 26px var(--accent-glow); }
#loginbar > button:active { transform: scale(.96); }
#login-status { font-size: 12px; color: var(--ink-soft); }
#login-status.err { color: var(--crit); }
#app { display: none; } #app.show { display: block; }

/* -- Control bars -- */
.bar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  padding: 8px 14px;
  background: rgba(11,14,23,.82);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.bar.filters { background: rgba(7,9,15,.90); }
.bar label { font-size: 12px; color: var(--ink-soft); display: flex; gap: 6px; align-items: center; }
.bar input[type=text] {
  flex: 1 1 180px; min-width: 150px; padding: 7px 11px;
  border: 1px solid var(--border); border-radius: var(--r);
  font-size: 13px; background: var(--surface); color: var(--ink);
  transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
}
.bar input[type=text]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.bar select, .bar input[type=range] { accent-color: var(--accent); }
.bar select {
  padding: 6px 9px; border: 1px solid var(--border); border-radius: var(--r);
  font-size: 13px; background: var(--surface); color: var(--ink);
}

/* -- Buttons -- */
.btn {
  background: var(--surface); color: var(--ink);
  border: 1px solid var(--border); border-radius: var(--r);
  padding: 6px 12px; font-size: 12.5px; cursor: pointer; letter-spacing: -0.01em;
  transition: background .14s, border-color .14s, box-shadow .14s, transform .10s var(--ease);
}
.btn:hover { background: var(--surface-2); border-color: var(--border-hi); }
.btn:active { transform: scale(.95); }
.btn.on {
  background: linear-gradient(135deg, var(--green), #059669);
  border-color: transparent; color: #fff;
  box-shadow: 0 0 14px var(--green-glow);
}

/* -- Segmented control -- */
.seg { display: inline-flex; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.seg button {
  border: 0; border-left: 1px solid var(--border); background: var(--surface);
  color: var(--ink-soft); padding: 6px 11px; font-size: 12px; cursor: pointer;
  transition: background .14s, color .14s;
}
.seg button:first-child { border-left: 0; }
.seg button.on { background: var(--surface-2); color: var(--ink); }
.seg button:hover:not(.on) { background: var(--surface-2); color: var(--ink); }
.spacer { margin-left: auto; }

/* -- Legend -- */
#legend {
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 7px 14px;
  background: rgba(7,9,15,.72);
  border-bottom: 1px solid var(--border);
}
#legend .lg {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; color: var(--ink-soft); cursor: pointer;
  border: 1px solid transparent; border-radius: 999px; padding: 3px 10px;
  transition: background .14s, border-color .14s;
}
#legend .lg:hover { background: var(--surface); border-color: var(--border); }
#legend .lg.off { opacity: .30; text-decoration: line-through; }
#legend .lg-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 5px currentColor; filter: brightness(1.3);
}

/* -- Scrubber -- */
#scrubber {
  display: flex; gap: 10px; align-items: center;
  padding: 7px 14px; background: rgba(7,9,15,.80);
  border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--ink-soft);
}
#scrubber input[type=range] { flex: 1; accent-color: var(--accent); }

/* -- Graph canvas -- */
#graph-wrap { position: relative; }
svg#map {
  width: 100vw; height: calc(100vh - 210px); display: block; cursor: grab; touch-action: none;
  background:
    radial-gradient(ellipse 60% 50% at 25% 55%, rgba(59,130,246,.05) 0%, transparent 65%),
    radial-gradient(ellipse 45% 40% at 78% 28%, rgba(16,185,129,.04) 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(30,20,50,.6) 0%, transparent 70%),
    var(--bg);
}
svg#map:active { cursor: grabbing; }
canvas#cmap { position: absolute; top: 0; left: 0; display: none; background: var(--bg); cursor: grab; touch-action: none; }
canvas#cmap:active { cursor: grabbing; }

/* -- Edges -- */
.edge { fill: none; }
.edge.cross { stroke-dasharray: 6 4; }
.edge.dim { opacity: .07; }
.edge.hidden { display: none; }
.edge.hot { stroke: var(--green) !important; filter: drop-shadow(0 0 4px var(--green-glow)); }
/* Path edges: animated marching-ants flowing source → target */
.edge.path {
  stroke: var(--path-col) !important; stroke-opacity: 1; stroke-width: 3 !important;
  stroke-dasharray: 14 8;
  filter: drop-shadow(0 0 5px var(--path-glow));
  animation: flowDash .65s linear infinite;
}
@keyframes flowDash {
  from { stroke-dashoffset: 22; }
  to   { stroke-dashoffset: 0; }
}

/* -- Nodes -- */
.node { cursor: pointer; }
.node circle { stroke-width: 2; transition: filter .20s var(--ease); }
.node text { font-size: 11px; fill: var(--ink-soft); pointer-events: none; font-weight: 500; }
.node .count { font-size: 10px; font-weight: 800; fill: #fff; pointer-events: none; }
.node.dim { opacity: .11; }
.node.faded { opacity: .26; }
.node.sel circle  { stroke: var(--path-col) !important; stroke-width: 3.5; filter: drop-shadow(0 0 12px var(--path-glow)); }
/* Path nodes: pulsing glow */
.node.path circle {
  stroke: var(--path-col) !important; stroke-width: 3;
  animation: pathPulse 1.6s ease-in-out infinite;
}
@keyframes pathPulse {
  0%, 100% { filter: drop-shadow(0 0 7px var(--path-glow)); }
  50%       { filter: drop-shadow(0 0 18px var(--path-glow)); }
}
.node.pick circle  { stroke: var(--warn) !important; stroke-width: 3.5; filter: drop-shadow(0 0 12px var(--warn-glow)); }
.node.origin circle { filter: drop-shadow(0 0 9px var(--green-glow)); }

/* -- Flow particles (JS-animated dots on path edges) -- */
.flow-dot { pointer-events: none; }

/* -- Hop-number badges on path nodes -- */
.hop-badge-bg { fill: var(--accent); stroke: var(--bg); stroke-width: 2; }
.hop-badge { pointer-events: none; font-size: 9px; font-weight: 800; fill: #fff; text-anchor: middle; dominant-baseline: central; }

/* -- Tooltip -- */
#tip {
  position: absolute; pointer-events: none; opacity: 0;
  transition: opacity .12s var(--ease);
  background: rgba(9,11,20,.90);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  color: var(--ink); border: 1px solid var(--border-hi);
  border-radius: 10px; padding: 10px 13px;
  font-size: 12px; max-width: 300px;
  box-shadow: 0 10px 36px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
  z-index: 60;
}
#tip .tt-title { font-weight: 700; margin-bottom: 3px; font-size: 13px; }
#tip .tt-sub { color: var(--ink-soft); font-size: 11px; margin-bottom: 6px; }
#tip .tt-row { display: flex; justify-content: space-between; gap: 14px; color: var(--ink-soft); }
#tip .tt-row span:last-child { color: var(--ink); font-weight: 600; }

/* -- Side panel -- */
#panel {
  position: absolute; top: 12px; right: 12px;
  width: 304px; max-height: calc(100% - 24px); overflow: auto;
  background: rgba(8,11,20,.88);
  backdrop-filter: blur(36px) saturate(200%);
  -webkit-backdrop-filter: blur(36px) saturate(200%);
  border: 1px solid var(--border-hi);
  border-radius: 14px;
  box-shadow: 0 16px 56px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.07);
  padding: 16px 17px; font-size: 13px; display: none; z-index: 50;
  animation: slideIn .20s var(--ease);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(10px) scale(.98); }
  to   { opacity: 1; transform: none; }
}
#panel.show { display: block; }
#panel .p-close {
  float: right; cursor: pointer; color: var(--ink-faint); font-size: 18px;
  border: 0; background: none; line-height: 1; padding: 0 2px;
  transition: color .14s; margin-top: -2px;
}
#panel .p-close:hover { color: var(--ink); }
#panel .p-chip {
  display: inline-block; color: #fff; font-size: 10.5px; font-weight: 700;
  padding: 2px 10px; border-radius: 999px; margin: 3px 6px 10px 0;
  text-transform: uppercase; letter-spacing: .04em;
  box-shadow: 0 0 10px rgba(0,0,0,.4);
}
#panel h3 { margin: 0 6px 3px 0; font-size: 15px; font-weight: 700; letter-spacing: -0.022em; }
#panel .p-addr {
  font-family: var(--mono); font-size: 10.5px;
  color: var(--ink-soft); word-break: break-all; margin-bottom: 11px;
  padding: 6px 9px; background: var(--surface); border-radius: 6px;
  border: 1px solid var(--border);
}
#panel .p-row {
  display: flex; justify-content: space-between; gap: 12px;
  padding: 5px 0; border-bottom: 1px solid var(--border);
}
#panel .p-row:last-of-type { border-bottom: 0; }
#panel .p-row .k { color: var(--ink-soft); }
#panel .p-row .v { font-weight: 600; }
#panel .donuts { display: flex; gap: 6px; justify-content: space-around; margin: 10px 0 6px; }
#panel .donut-cap { font-size: 11px; color: var(--ink-soft); margin-top: 3px; text-align: center; }
#panel textarea {
  width: 100%; background: var(--surface); color: var(--ink);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; padding: 8px; margin-top: 10px; resize: vertical; min-height: 56px;
  transition: border-color .18s;
}
#panel textarea:focus { outline: none; border-color: var(--accent); }
#panel .p-members, #panel .p-tx {
  margin: 10px 0 0; padding: 0; list-style: none; max-height: 160px; overflow: auto;
}
#panel .p-members li {
  font-family: var(--mono); font-size: 11px;
  padding: 4px 0; border-bottom: 1px dashed var(--border); color: var(--ink-soft);
}
#panel .p-tx li {
  display: flex; justify-content: space-between; gap: 8px;
  font-size: 12px; padding: 5px 0; border-bottom: 1px dashed var(--border);
}
#panel .p-tx .tx-d { color: var(--ink-soft); }
#panel a { color: var(--path-col); }
#panel a:hover { color: var(--ink); }

/* -- Mini-map -- */
#mini {
  position: absolute; bottom: 12px; left: 12px;
  width: 178px; height: 112px;
  background: rgba(7,9,15,.84);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--border); border-radius: 9px;
  z-index: 40; cursor: pointer;
  box-shadow: 0 6px 20px rgba(0,0,0,.45);
}
#mini .mini-vp { fill: rgba(59,130,246,.10); stroke: var(--accent); stroke-width: 1; }

.note { font-size: 11px; color: var(--ink-soft); padding: 6px 14px; }
/* -- Risk composition strip (graph-level risk bar) -- */
#risk-strip { display:none; width:100%; overflow:hidden; flex-shrink:0; }
#risk-strip .rs { flex-shrink:0; transition:flex .9s var(--ease); }
/* Critical/sanctioned nodes pulse in risk mode */
.node.risk-crit circle { animation:critPulse 2.4s ease-in-out infinite; }
@keyframes critPulse {
  0%,100% { filter:drop-shadow(0 0 4px rgba(185,28,28,.45)); }
  50%      { filter:drop-shadow(0 0 15px rgba(185,28,28,.9)); }
}
/* Panel polish */
#panel { scrollbar-width:thin; scrollbar-color:var(--border-hi) transparent; }
.p-risk-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); margin-bottom:3px; }
.p-tl { margin:8px 0 10px; padding:8px; background:rgba(255,255,255,.04); border-radius:7px; border:1px solid rgba(255,255,255,.07); overflow:hidden; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>

<div id="loginbar">
  <h1>Operator fund-flow graph</h1>
  <input type="password" id="key" placeholder="Admin key (X-Recupero-Admin-Key)" autocomplete="off">
  <input type="text" id="inv" placeholder="investigation id (UUID)" autocomplete="off">
  <button id="load">Load graph</button>
  <span id="login-status"></span>
</div>

<div id="app">
  <div class="bar">
    <input type="text" id="search" placeholder="Search address or label..." autocomplete="off">
    <label>Colour
      <select id="color-by"><option value="recoverability">Recoverability</option><option value="risk">Risk</option></select>
    </label>
    <span class="seg" role="group" aria-label="Layout">
      <button type="button" id="lay-force" class="on">Force</button>
      <button type="button" id="lay-flow">Flow</button>
      <button type="button" id="lay-value">Value flow</button>
      <button type="button" id="lay-radial">Radial</button>
    </span>
    <button type="button" class="btn" id="btn-path">Find path</button>
    <button type="button" class="btn" id="btn-expand">Open groups</button>
    <button type="button" class="btn" id="btn-collapse">Close groups</button>
    <span class="spacer"></span>
    <button type="button" class="btn" id="btn-fit">Fit</button>
    <button type="button" class="btn" id="btn-reset">Reset</button>
    <button type="button" class="btn" id="btn-png">PNG</button>
    <button type="button" class="btn" id="btn-csv">CSV</button>
    <select id="snap-list" title="Saved views"><option value="">Saved views…</option></select>
    <button type="button" class="btn" id="btn-save-view">Save view</button>
    <button type="button" class="btn" id="btn-canvas" title="Canvas renderer - scales to large graphs">Canvas</button>
  </div>
  <div class="bar filters">
    <label>Min value <input type="range" id="f-min" min="0" max="100" value="0"><span id="f-min-lab" style="min-width:70px;">$0</span></label>
    <label>Asset <select id="f-asset"><option value="">All assets</option></select></label>
    <span id="meta-stat" class="spacer" style="font-size:12px;color:#8a8f9a;"></span>
  </div>
  <div id="risk-strip"></div>
  <div id="scrubber" hidden>
    <button type="button" class="btn" id="tl-play">&#9654; Play</button>
    <span id="tl-from"></span><input type="range" id="tl-range" min="0" max="100" value="100"><span id="tl-to"></span>
  </div>
  <div id="legend"></div>
  <p class="note" id="path-hint" hidden>Path mode: click start point, then end point.</p>
  <div id="graph-wrap">
    <svg id="map" role="img" aria-label="Operator fund-flow graph"></svg>
    <canvas id="cmap" aria-hidden="true"></canvas>
    <svg id="mini" aria-hidden="true"></svg>
    <div id="tip"></div>
    <div id="panel" aria-live="polite"></div>
  </div>
</div>

<script>
"use strict";
// ---- bootstrap: prompt for admin key, fetch the admin-gated JSON ----
(function () {
  const qs = new URLSearchParams(location.search);
  if (qs.get("inv")) document.getElementById("inv").value = qs.get("inv");
  const savedKey = sessionStorage.getItem("recupero.adminkey");
  if (savedKey) document.getElementById("key").value = savedKey;
  const statusEl = document.getElementById("login-status");
  function setStatus(msg, err) { statusEl.textContent = msg; statusEl.className = err ? "err" : ""; }
  async function load() {
    const key = document.getElementById("key").value.trim();
    const inv = document.getElementById("inv").value.trim();
    if (!key || !inv) { setStatus("Enter admin key and investigation id.", true); return; }
    setStatus("Loading...", false);
    try {
      const resp = await fetch("/v1/operator/graph/" + encodeURIComponent(inv), { headers: { "X-Recupero-Admin-Key": key } });
      if (resp.status === 401 || resp.status === 403) { setStatus("Unauthorized - check the admin key.", true); return; }
      if (resp.status === 404) { setStatus("No case found for that investigation id.", true); return; }
      if (!resp.ok) { setStatus("Failed (" + resp.status + ").", true); return; }
      const data = await resp.json();
      sessionStorage.setItem("recupero.adminkey", key);
      setStatus((data.meta.nodeCount || 0) + " nodes - " + (data.meta.edgeCount || 0) + " edges" + (data.meta.riskScored ? " - risk-scored" : ""), false);
      document.getElementById("app").classList.add("show");
      initGraph(data, inv);
    } catch (e) { setStatus("Network error.", true); }
  }
  document.getElementById("load").addEventListener("click", load);
  document.getElementById("key").addEventListener("keydown", e => { if (e.key === "Enter") load(); });
  document.getElementById("inv").addEventListener("keydown", e => { if (e.key === "Enter") load(); });
})();

// ---- graph engine ----
let __graphInit = false;
function initGraph(DATA, viewId) {
  if (__graphInit) { location.reload(); return; }   // simplest re-load on second case
  __graphInit = true;
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("map"), mini = document.getElementById("mini"), tip = document.getElementById("tip"), panel = document.getElementById("panel");

  // -- SVG arrowhead markers --
  (function(){
    const defs = document.createElementNS(NS, "defs");
    // One marker; fill="context-stroke" inherits each edge's stroke colour automatically
    // (Chrome 63+, Firefox 60+, Safari 12+).
    const mk = document.createElementNS(NS, "marker");
    mk.setAttribute("id", "arr");
    mk.setAttribute("viewBox", "0 0 10 10");
    mk.setAttribute("refX", "9"); mk.setAttribute("refY", "5");
    mk.setAttribute("markerWidth", "6"); mk.setAttribute("markerHeight", "6");
    mk.setAttribute("orient", "auto");
    const p = document.createElementNS(NS, "path");
    p.setAttribute("d", "M 0 1 L 9 5 L 0 9 z");
    p.setAttribute("fill", "context-stroke"); p.setAttribute("fill-opacity", "0.72");
    mk.appendChild(p); defs.appendChild(mk);
    svg.insertBefore(defs, svg.firstChild);
  })();
  const nodeById = new Map(DATA.nodes.map(n => [n.id, n]));
  const clusterById = new Map((DATA.clusters || []).map(c => [c.id, c]));
  const usdNum = s => parseFloat(String(s || "0").replace(/[$,]/g, "")) || 0;
  const fmtUsd = v => "$" + Number(v).toLocaleString(undefined, { maximumFractionDigits: 2 });
  const EDGE_COL = "#252b3e", EDGE_CROSS = "#ea580c";
  const RISK_LABEL = { "SANCTIONED": "Sanctioned", "CRITICAL": "Critical", "HIGH-RISK": "High risk", "MODERATE": "Moderate", "CLEAN": "Clean" };

  const STATUS = {};
  for (const n of DATA.nodes) STATUS[n.status] = { label: n.statusLabel, color: n.statusColor };
  for (const c of (DATA.clusters || [])) STATUS[c.status] = { label: c.statusLabel, color: c.statusColor };
  const statusColor = st => (STATUS[st] && STATUS[st].color) || "#94A3B8";
  const statusLabel = st => (STATUS[st] && STATUS[st].label) || st;

  const VK = "recupero.op." + (viewId || "case");
  const expanded = new Set(), statusOff = new Set();
  let minUsd = 0, asset = "", timeCutoff = null, layout = "force", colorBy = "recoverability";
  let pathMode = false, pickA = null;
  const pathNodes = new Set(), pathEdges = new Set();
  let pathNodeOrder = [], pathEdgeOrder = [];   // ordered for badges + panel
  let pathParticles = [], pathHopLabels = [];   // SVG elements, cleaned on rebuild
  let selected = null, isolated = null, isoKeep = null;
  const expandedHops = new Set();   // "address|direction" already pulled in
  let annotations = {};             // node_id -> note (server-backed)
  const adminKey = () => sessionStorage.getItem("recupero.adminkey") || "";

  async function expandNode(n, direction, btn){

    if (expandedHops.has(tag)) { if(btn) btn.textContent = "ok done"; return; }
    const key = sessionStorage.getItem("recupero.adminkey") || "";
    const orig = btn ? btn.textContent : "";
    if (btn) { btn.textContent = "..."; btn.disabled = true; }
    try {
      const url = "/v1/operator/expand?chain=" + encodeURIComponent(n.chain || "") +
        "&address=" + encodeURIComponent(n.id) + "&direction=" + direction + "&limit=40" +
        "&inv=" + encodeURIComponent(viewId || "");
      const resp = await fetch(url, { headers: { "X-Recupero-Admin-Key": key } });
      if (!resp.ok) { if(btn){ btn.textContent = (resp.status===503? "unavailable" : "failed "+resp.status); btn.disabled=false; } return; }
      const data = await resp.json();
      expandedHops.add(tag);
      mergeExpansion(n, data);
      if (btn) btn.textContent = "+" + (data.meta.counterpartyCount||0) + (data.meta.truncated? " (capped)" : "");
    } catch (e) { if(btn){ btn.textContent = "error"; btn.disabled = false; } }

  function mergeExpansion(parent, data){
    const pdepth = (nodeById.get(parent.id) || {}).depth || 0;
    for (const nn of (data.nodes||[])) {
      if (!nodeById.has(nn.id)) { nn.depth = pdepth + 1; DATA.nodes.push(nn); nodeById.set(nn.id, nn); }
    }
    const ek = e => e.source + ">" + e.target;
    const existing = new Map(DATA.edges.map(e => [ek(e), e]));
    for (const ne of (data.edges||[])) {
      const k = ek(ne), ex = existing.get(k);
      if (ex) { ex.totalUsdNumeric = (ex.totalUsdNumeric||0) + (ne.totalUsdNumeric||0); ex.transferCount = (ex.transferCount||0) + (ne.transferCount||0); }
      else { DATA.edges.push(ne); existing.set(k, ne); }
    }

  }

  function paintPath(){
    // Remove stale particles + hop badges (safe if already detached by render())
    for (const p of pathParticles) p.remove();
    for (const l of pathHopLabels) l.remove();
    pathParticles=[]; pathHopLabels=[];
    // Toggle CSS classes
    for (const g of nodeEls) g.classList.toggle("path",pathNodes.has(g.__n.id));
    for (const ln of edgeEls) ln.classList.toggle("path",pathEdges.has(ln.__e.id));
    if (!pathNodeOrder.length) return;
    // -- Hop-number badges --
    const hopIdx = new Map(pathNodeOrder.map((id,i)=>[id,i+1]));
    for (const g of nodeEls){
      if (!pathNodes.has(g.__n.id)) continue;
      const r = radius(g.__n), bx = r*0.68, by = -r*0.68, br = 7;
      const bg = document.createElementNS(NS,"circle");
      bg.setAttribute("class","hop-badge-bg"); bg.setAttribute("cx",String(bx)); bg.setAttribute("cy",String(by)); bg.setAttribute("r",String(br));
      const tx = document.createElementNS(NS,"text");
      tx.setAttribute("class","hop-badge"); tx.setAttribute("x",String(bx)); tx.setAttribute("y",String(by));
      tx.textContent = String(hopIdx.get(g.__n.id)||"");
      g.appendChild(bg); g.appendChild(tx);
      pathHopLabels.push(bg,tx);
    }
    // -- Flow particles (2 per path edge, staggered) --
    const pathEls = edgeEls.filter(ln=>pathEdges.has(ln.__e.id));
    pathEls.forEach((ln,i)=>{
      for (const off of [0, 0.5]){
        const dot = document.createElementNS(NS,"circle");
        dot.setAttribute("class","flow-dot"); dot.setAttribute("r","3.5");
        dot.setAttribute("fill","#93c5fd"); dot.setAttribute("opacity","0.9");
        dot.__e = ln.__e; dot.__offset = (off + i*0.17) % 1;
        gN.appendChild(dot); pathParticles.push(dot);
      }
    });
  }

    }
    const present=new Set(DATA.nodes.map(n=>n.status));
    for(const st of Object.keys(STATUS)){ if(!present.has(st))continue; const item=document.createElement("div");item.className="lg"+(statusOff.has(st)?" off":"");item.title="Click to show / hide";const d=document.createElement("span");d.className="lg-dot";d.style.background=statusColor(st);const x=document.createElement("span");x.textContent=statusLabel(st);item.appendChild(d);item.appendChild(x);item.onclick=()=>{if(statusOff.has(st))statusOff.delete(st);else statusOff.add(st);rebuild(false);};el.appendChild(item);}
  }

  function drawMini(){ if(!view.nodes.length){mini.replaceChildren();return;} const mw=178,mh=112; let a=Infinity,b=Infinity,c=-Infinity,d=-Infinity; for(const n of view.nodes){const p=pos.get(n.id);a=Math.min(a,p.x);b=Math.min(b,p.y);c=Math.max(c,p.x);d=Math.max(d,p.y);} const bw=(c-a)||1,bh=(d-b)||1,pad=8,s=Math.min((mw-2*pad)/bw,(mh-2*pad)/bh); const ox=pad-a*s+(mw-2*pad-bw*s)/2, oy=pad-b*s+(mh-2*pad-bh*s)/2; mini.__t={s,ox,oy}; const frag=document.createDocumentFragment(); for(const n of view.nodes){const p=pos.get(n.id);const dot=document.createElementNS(NS,"circle");dot.setAttribute("cx",p.x*s+ox);dot.setAttribute("cy",p.y*s+oy);dot.setAttribute("r","1.7");dot.setAttribute("fill",nodeFill(n));frag.appendChild(dot);} const vx0=-tx/scale,vy0=-ty/scale,vx1=(W-tx)/scale,vy1=(H-ty)/scale; const rect=document.createElementNS(NS,"rect");rect.setAttribute("class","mini-vp");rect.setAttribute("x",vx0*s+ox);rect.setAttribute("y",vy0*s+oy);rect.setAttribute("width",Math.max(2,(vx1-vx0)*s));rect.setAttribute("height",Math.max(2,(vy1-vy0)*s));frag.appendChild(rect); mini.replaceChildren(frag); }
  mini.addEventListener("click",ev=>{const t=mini.__t;if(!t)return;const r=mini.getBoundingClientRect();const wx=(ev.clientX-r.left-t.ox)/t.s,wy=(ev.clientY-r.top-t.oy)/t.s;tx=W/2-wx*scale;ty=H/2-wy*scale;applyT();});

  function download(href,name){const a=document.createElement("a");a.href=href;a.download=name;document.body.appendChild(a);a.click();a.remove();}
  function exportPNG(){ try{ const clone=svg.cloneNode(true);clone.setAttribute("xmlns",NS);clone.setAttribute("width",W);clone.setAttribute("height",H); const st=document.createElementNS(NS,"style");st.textContent=".edge{fill:none}.node text{font-size:11px;fill:#e6e7eb}.node .count{font-weight:700;fill:#fff}";clone.insertBefore(st,clone.firstChild); const bg=document.createElementNS(NS,"rect");bg.setAttribute("width","100%");bg.setAttribute("height","100%");bg.setAttribute("fill","#0f1014");clone.insertBefore(bg,clone.firstChild); const xml=new XMLSerializer().serializeToString(clone); const img=new Image(); img.onload=()=>{const cv=document.createElement("canvas");cv.width=W*2;cv.height=H*2;const cx=cv.getContext("2d");cx.scale(2,2);cx.drawImage(img,0,0);download(cv.toDataURL("image/png"),"operator-graph.png");}; img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml); }catch(e){} }
  function exportCSV(){ const esc=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"'; const rows=[["From","To","USD","Transfers","Assets","First","Last","Cross-chain","SourceRisk","TargetRisk"]]; const riskOf=id=>{const n=nodeById.get(id);return n&&n.risk?n.risk.verdict:"";}; for(const e of DATA.edges){rows.push([nlbl(e.source),nlbl(e.target),e.totalUsdNumeric||0,e.transferCount||0,e.dominantSymbol||"",e.firstTime||"",e.lastTime||"",e.isCrossChain?"yes":"no",riskOf(e.source),riskOf(e.target)]);} const csv=rows.map(r=>r.map(esc).join(",")).join("\r\n"); download("data:text/csv;charset=utf-8,"+encodeURIComponent(csv),"operator-graph.csv"); }
  function nlbl(id){const n=nodeById.get(id);return n?(n.label||n.short||id):id;}

  document.getElementById("search").addEventListener("input",ev=>{const q=ev.target.value.trim().toLowerCase();if(!q){clearIsolate();return;}let hit=null;for(const g of nodeEls){const n=g.__n;const m=(n.label||"").toLowerCase().includes(q)||(n.id||"").toLowerCase().includes(q)||(n.short||"").toLowerCase().includes(q);g.classList.toggle("dim",!m);if(m&&!hit)hit=n;}for(const ln of edgeEls)ln.classList.add("dim");if(hit){const p=pos.get(hit.id);tx=W/2-p.x*scale;ty=H/2-p.y*scale;applyT();}});
  document.getElementById("color-by").addEventListener("change",ev=>{colorBy=ev.target.value;recolor();saveState();});
  function setLayout(l){layout=l;for(const [id,key] of [["lay-force","force"],["lay-flow","flow"],["lay-value","value"],["lay-radial","radial"]])document.getElementById(id).classList.toggle("on",key===l);computeRadial(view);computeValueRanks(view);alpha=.9;saveState();setTimeout(fit,700);}
  document.getElementById("lay-force").onclick=()=>setLayout("force");
  document.getElementById("lay-flow").onclick=()=>setLayout("flow");
  document.getElementById("lay-value").onclick=()=>setLayout("value");
  document.getElementById("lay-radial").onclick=()=>setLayout("radial");
  document.getElementById("btn-path").onclick=function(){pathMode=!pathMode;this.classList.toggle("on",pathMode);document.getElementById("path-hint").hidden=!pathMode;if(!pathMode)clearPath();};
  document.getElementById("btn-expand").onclick=()=>{for(const c of clusterById.keys())expanded.add(c);rebuild(true);};
  document.getElementById("btn-collapse").onclick=()=>{expanded.clear();rebuild(true);};
  document.getElementById("btn-reset").onclick=()=>{tx=0;ty=0;scale=1;applyT();clearSelection();clearPath();};
  document.getElementById("btn-fit").onclick=fit;
  document.getElementById("btn-png").onclick=exportPNG;
  document.getElementById("btn-csv").onclick=exportCSV;
  document.getElementById("btn-canvas").onclick=()=>setRenderer(!useCanvas);

  const fmin=document.getElementById("f-min"),fminLab=document.getElementById("f-min-lab");
  fmin.value=String(Math.round((minUsd/maxEdgeUsd)*100));
  const setMin=()=>{minUsd=(fmin.value/100)*maxEdgeUsd;fminLab.textContent=fmtUsd(minUsd);applyFilters();saveState();};
  fmin.addEventListener("input",setMin); fminLab.textContent=fmtUsd(minUsd);
  const fasset=document.getElementById("f-asset");
  for(const a of (DATA.meta.assets||[])){const o=document.createElement("option");o.value=a;o.textContent=a;fasset.appendChild(o);}
  if(!(DATA.meta.assets||[]).length)fasset.parentElement.style.display="none";
  if(asset)fasset.value=asset;
  fasset.addEventListener("change",()=>{asset=fasset.value;applyFilters();saveState();});

  const trng=DATA.meta.timeRange;
  if(trng&&trng.min&&trng.max&&trng.min!==trng.max){ const scrub=document.getElementById("scrubber");scrub.hidden=false; const d0=new Date(trng.min+"T00:00:00Z").getTime(),d1=new Date(trng.max+"T00:00:00Z").getTime(); document.getElementById("tl-from").textContent=trng.min; const slider=document.getElementById("tl-range"),toLab=document.getElementById("tl-to");toLab.textContent=trng.max; const setFrom=()=>{const f=slider.value/100;const iso=new Date(d0+f*(d1-d0)).toISOString().slice(0,10);timeCutoff=(+slider.value>=100)?null:iso;toLab.textContent=iso;applyFilters();}; slider.addEventListener("input",setFrom); let playing=null;const pb=document.getElementById("tl-play"); pb.onclick=()=>{if(playing){clearInterval(playing);playing=null;pb.textContent="> Play";return;}if(+slider.value>=100)slider.value=0;pb.textContent="|| Pause";playing=setInterval(()=>{slider.value=Math.min(100,+slider.value+2);setFrom();if(+slider.value>=100){clearInterval(playing);playing=null;pb.textContent="> Play";}},120);}; }

  function fit(){ if(!view.nodes.length)return; let a=Infinity,b=Infinity,c=-Infinity,d=-Infinity; for(const n of view.nodes){const p=pos.get(n.id);a=Math.min(a,p.x);b=Math.min(b,p.y);c=Math.max(c,p.x);d=Math.max(d,p.y);} const bw=(c-a)||1,bh=(d-b)||1,pad=70; scale=Math.max(.2,Math.min(2,Math.min((W-pad)/bw,(H-pad)/bh))); tx=W/2-((a+c)/2)*scale; ty=H/2-((b+d)/2)*scale; applyT(); }
  window.addEventListener("resize",()=>{W=svg.clientWidth||W;H=svg.clientHeight||H;computeRadial(view);if(useCanvas)sizeCanvas();});

  // ---- server-backed annotations + saved views (Phase 3.9) ----
  const API = "/v1/operator/graph/" + encodeURIComponent(viewId || "");
  async function saveAnnotation(nodeId, note){
    try{ await fetch(API+"/annotations",{method:"PUT",headers:{"X-Recupero-Admin-Key":adminKey(),"Content-Type":"application/json"},body:JSON.stringify({node_id:nodeId,note:note||""})}); }catch(e){}
  }
  async function loadAnnotations(){
    try{ const r=await fetch(API+"/annotations",{headers:{"X-Recupero-Admin-Key":adminKey()}}); if(r.ok){ const d=await r.json(); annotations=d.annotations||{}; } }catch(e){}
  }
  function currentState(){ return {layout, expanded:[...expanded], statusOff:[...statusOff], minUsd, asset, colorBy}; }
  function applyState(s){
    if(!s)return;
    if(["force","flow","value","radial"].includes(s.layout))layout=s.layout;
    expanded.clear(); (s.expanded||[]).forEach(c=>expanded.add(c));
    statusOff.clear(); (s.statusOff||[]).forEach(x=>statusOff.add(x));
    minUsd=+s.minUsd||0; asset=s.asset||""; if(s.colorBy)colorBy=s.colorBy;
    document.getElementById("color-by").value=colorBy;
    document.getElementById("f-min").value=String(Math.round((minUsd/maxEdgeUsd)*100));
    document.getElementById("f-min-lab").textContent=fmtUsd(minUsd);
    const fa=document.getElementById("f-asset"); if(fa)fa.value=asset;
    for(const [id,k] of [["lay-force","force"],["lay-flow","flow"],["lay-value","value"],["lay-radial","radial"]])document.getElementById(id).classList.toggle("on",k===layout);
    rebuild(true); saveState();
  }
  async function refreshSnapshots(){
    try{ const r=await fetch(API+"/snapshots",{headers:{"X-Recupero-Admin-Key":adminKey()}}); if(!r.ok)return; const d=await r.json(); const sel=document.getElementById("snap-list"); sel.replaceChildren(); const o0=document.createElement("option");o0.value="";o0.textContent="Saved views...";sel.appendChild(o0); for(const s of (d.snapshots||[])){ const o=document.createElement("option");o.value=s.name;o.textContent=s.name;sel.appendChild(o);} }catch(e){}
  }
  document.getElementById("btn-save-view").onclick=async()=>{
    const name=(prompt("Save current view as:")||"").trim(); if(!name)return;
    try{ const r=await fetch(API+"/snapshots",{method:"PUT",headers:{"X-Recupero-Admin-Key":adminKey(),"Content-Type":"application/json"},body:JSON.stringify({name,state:currentState()})}); if(r.ok)refreshSnapshots(); else alert("Save failed ("+r.status+")"); }catch(e){alert("Save failed");}
  };
  document.getElementById("snap-list").onchange=async(ev)=>{
    const name=ev.target.value; if(!name)return;
    try{ const r=await fetch(API+"/snapshots/"+encodeURIComponent(name),{headers:{"X-Recupero-Admin-Key":adminKey()}}); if(r.ok){ const d=await r.json(); applyState(d.state); } }catch(e){}
  };

  // ---- live updates (4.13): subscribe to the investigation's SSE stream ----
  function mergeLiveDelta(data){
    let added=0;
    for(const nn of (data.nodes||[])){ if(!nodeById.has(nn.id)){ if(nn.depth==null)nn.depth=1; DATA.nodes.push(nn); nodeById.set(nn.id,nn); added++; } }
    const ek=e=>e.source+">"+e.target; const ex=new Map(DATA.edges.map(e=>[ek(e),e]));
    let edgeAdds=0;
    for(const ne of (data.edges||[])){ const k=ek(ne); const e=ex.get(k); if(e){ e.totalUsdNumeric=(e.totalUsdNumeric||0)+(ne.totalUsdNumeric||0); e.transferCount=(e.transferCount||0)+(ne.transferCount||0); } else { DATA.edges.push(ne); ex.set(k,ne); edgeAdds++; } }
    if(added||edgeAdds){ document.getElementById("meta-stat").textContent = DATA.nodes.length+" nodes - "+DATA.edges.length+" edges (live)"; rebuild(true); }
  }
  async function connectLiveStream(){
    if(typeof EventSource==="undefined")return;
    try{
      // Never put the long-lived admin key in a URL (proxy logs / Referer).
      // Mint a short-lived stream token over a header-authenticated POST.
      const r=await fetch(API+"/stream-token",{method:"POST",headers:{"X-Recupero-Admin-Key":adminKey()}});
      if(!r.ok)return;
      const tok=(await r.json()).token;
      const es=new EventSource(API+"/stream?token="+encodeURIComponent(tok));
      es.onmessage=(e)=>{ try{ const ev=JSON.parse(e.data); if(ev&&ev.type==="delta") mergeLiveDelta(ev); }catch(_){} };
      es.onerror=()=>{ /* token may have expired — drop and reconnect with a fresh one */ es.close(); setTimeout(connectLiveStream,5000); };
    }catch(e){}
  }

  document.getElementById("color-by").value=colorBy;
  for(const [id,key] of [["lay-force","force"],["lay-flow","flow"],["lay-value","value"],["lay-radial","radial"]])document.getElementById(id).classList.toggle("on",key===layout);
  loadAnnotations(); refreshSnapshots(); connectLiveStream();
  rebuild(false); loop(); setTimeout(fit,1400);
}
