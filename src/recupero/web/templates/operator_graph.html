<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<title>Operator fund-flow graph — Recupero</title>
<style>
  :root { --fg:#1a1a1a; --muted:#566; --bg:#0f1014; --card:#fff; --border:#2a2d36; --accent:#2a5e3e; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:#0f1014; color:#e6e7eb; }
  #loginbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:12px 18px; border-bottom:1px solid #1f2127; }
  #loginbar h1 { font-size:15px; margin:0 16px 0 0; font-weight:600; }
  #loginbar input { background:#1a1c22; color:#e6e7eb; border:1px solid #2a2d36; border-radius:5px; padding:7px 10px; font-size:13px; }
  #loginbar input#inv { width:330px; font-family:ui-monospace,monospace; }
  #loginbar button { background:#2a5e3e; color:#fff; border:0; border-radius:5px; padding:8px 14px; font-size:13px; cursor:pointer; }
  #login-status { font-size:12px; color:#8a8f9a; }
  #login-status.err { color:#fca5a5; }
  #app { display:none; }
  #app.show { display:block; }
  .bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:9px 14px; border-bottom:1px solid #1f2127; }
  .bar.filters { background:#15171c; }
  .bar label { font-size:12px; color:#8a8f9a; display:flex; gap:6px; align-items:center; }
  .bar input[type=text] { flex:1 1 180px; min-width:150px; padding:7px 10px; border:1px solid #2a2d36; border-radius:5px; font-size:13px; background:#1a1c22; color:#e6e7eb; }
  .bar select { padding:6px 8px; border:1px solid #2a2d36; border-radius:5px; font-size:13px; background:#1a1c22; color:#e6e7eb; }
  .btn { background:#1a1c22; color:#e6e7eb; border:1px solid #2a2d36; border-radius:5px; padding:7px 11px; font-size:13px; cursor:pointer; }
  .btn:hover { background:#24272f; } .btn.on { background:#2a5e3e; border-color:#2a5e3e; color:#fff; }
  .seg { display:inline-flex; border:1px solid #2a2d36; border-radius:5px; overflow:hidden; }
  .seg button { border:0; background:#1a1c22; color:#e6e7eb; padding:7px 10px; font-size:13px; cursor:pointer; }
  .seg button.on { background:#2a5e3e; color:#fff; }
  .spacer { margin-left:auto; }
  #legend { display:flex; gap:8px; flex-wrap:wrap; padding:8px 14px; border-bottom:1px solid #1f2127; }
  #legend .lg { display:flex; align-items:center; gap:6px; font-size:12px; color:#cdd2da; cursor:pointer; border:1px solid transparent; border-radius:999px; padding:2px 8px; }
  #legend .lg:hover { background:#24272f; } #legend .lg.off { opacity:.4; text-decoration:line-through; }
  #legend .lg-dot { width:11px; height:11px; border-radius:50%; }
  #scrubber { display:flex; gap:10px; align-items:center; padding:8px 14px; border-bottom:1px solid #1f2127; font-size:12px; color:#8a8f9a; }
  #scrubber input[type=range] { flex:1; }
  #graph-wrap { position:relative; }
  svg#map { width:100vw; height:calc(100vh - 210px); display:block; background:#0f1014; cursor:grab; touch-action:none; }
  svg#map:active { cursor:grabbing; }
  .edge { fill:none; } .edge.cross { stroke-dasharray:5 4; } .edge.dim { opacity:.10; }
  .edge.hot { stroke:#7fe7a8 !important; } .edge.path { stroke:#93c5fd !important; stroke-opacity:1; } .edge.hidden { display:none; }
  .node { cursor:pointer; } .node circle { stroke-width:2.5; }
  .node.dim { opacity:.16; } .node.faded { opacity:.30; }
  .node.sel circle, .node.path circle { stroke:#93c5fd; stroke-width:4; }
  .node.pick circle { stroke:#fbbf24; stroke-width:4; }
  .node text { font-size:11px; fill:#e6e7eb; pointer-events:none; } .node .count { font-size:10px; font-weight:700; fill:#fff; pointer-events:none; }
  #tip { position:absolute; pointer-events:none; opacity:0; transition:opacity .1s; background:#1f2430; color:#f3f4f6; border-radius:7px; padding:9px 11px; font-size:12px; max-width:300px; box-shadow:0 6px 22px rgba(0,0,0,.4); z-index:60; }
  #tip .tt-title { font-weight:700; margin-bottom:3px; } #tip .tt-sub { color:#aab2c0; font-size:11px; margin-bottom:5px; } #tip .tt-row { display:flex; justify-content:space-between; gap:14px; }
  #panel { position:absolute; top:10px; right:10px; width:296px; max-height:calc(100% - 20px); overflow:auto; background:#171a21; border:1px solid #2a2d36; border-radius:8px; box-shadow:0 8px 28px rgba(0,0,0,.5); padding:14px 15px; font-size:13px; display:none; z-index:50; }
  #panel.show { display:block; }
  #panel .p-close { float:right; cursor:pointer; color:#8a8f9a; font-size:16px; border:0; background:none; }
  #panel .p-chip { display:inline-block; color:#fff; font-size:11px; font-weight:600; padding:2px 9px; border-radius:999px; margin:2px 6px 8px 0; }
  #panel h3 { margin:0 6px 2px 0; font-size:15px; }
  #panel .p-addr { font-family:ui-monospace,monospace; font-size:11px; color:#8a8f9a; word-break:break-all; margin-bottom:8px; }
  #panel .p-row { display:flex; justify-content:space-between; gap:12px; padding:4px 0; border-bottom:1px solid #2a2d36; }
  #panel .p-row:last-of-type { border-bottom:0; } #panel .p-row .k { color:#8a8f9a; } #panel .p-row .v { font-weight:600; }
  #panel .donuts { display:flex; gap:6px; justify-content:space-around; margin:8px 0 4px; }
  #panel .donut-cap { font-size:11px; color:#8a8f9a; margin-top:2px; text-align:center; }
  #panel textarea { width:100%; background:#0f1014; color:#e6e7eb; border:1px solid #2a2d36; border-radius:5px; font-size:12px; padding:7px; margin-top:8px; resize:vertical; min-height:54px; }
  #panel .p-members, #panel .p-tx { margin:8px 0 0; padding:0; list-style:none; max-height:160px; overflow:auto; }
  #panel .p-members li { font-family:ui-monospace,monospace; font-size:11px; padding:3px 0; border-bottom:1px dashed #2a2d36; }
  #panel .p-tx li { display:flex; justify-content:space-between; gap:8px; font-size:12px; padding:4px 0; border-bottom:1px dashed #2a2d36; }
  #panel .p-tx .tx-d { color:#8a8f9a; } #panel a { color:#93c5fd; }
  #mini { position:absolute; bottom:10px; left:10px; width:178px; height:112px; background:rgba(20,22,28,.9); border:1px solid #2a2d36; border-radius:6px; z-index:40; cursor:pointer; }
  #mini .mini-vp { fill:rgba(127,231,168,.10); stroke:#2a5e3e; stroke-width:1; }
  .note { font-size:11px; color:#8a8f9a; padding:6px 14px; }
</style>
</head>
<body>

<div id="loginbar">
  <h1>Operator fund-flow graph</h1>
  <input type="password" id="key" placeholder="Admin key (X-Recupero-Admin-Key)" autocomplete="off">
  <input type="text" id="inv" placeholder="investigation id (UUID)" autocomplete="off">
  <button id="load">Load graph</button>
  <span id="login-status"></span>
</div>

<div id="app">
  <div class="bar">
    <input type="text" id="search" placeholder="Search address or label…" autocomplete="off">
    <label>Colour
      <select id="color-by"><option value="recoverability">Recoverability</option><option value="risk">Risk</option></select>
    </label>
    <span class="seg" role="group" aria-label="Layout">
      <button type="button" id="lay-force" class="on">Force</button>
      <button type="button" id="lay-flow">Flow</button>
      <button type="button" id="lay-value">Value flow</button>
      <button type="button" id="lay-radial">Radial</button>
    </span>
    <button type="button" class="btn" id="btn-path">Find path</button>
    <button type="button" class="btn" id="btn-expand">Open groups</button>
    <button type="button" class="btn" id="btn-collapse">Close groups</button>
    <span class="spacer"></span>
    <button type="button" class="btn" id="btn-fit">Fit</button>
    <button type="button" class="btn" id="btn-reset">Reset</button>
    <button type="button" class="btn" id="btn-png">PNG</button>
    <button type="button" class="btn" id="btn-csv">CSV</button>
    <select id="snap-list" title="Saved views"><option value="">Saved views…</option></select>
    <button type="button" class="btn" id="btn-save-view">Save view</button>
  </div>
  <div class="bar filters">
    <label>Min value <input type="range" id="f-min" min="0" max="100" value="0"><span id="f-min-lab" style="min-width:70px;">$0</span></label>
    <label>Asset <select id="f-asset"><option value="">All assets</option></select></label>
    <span id="meta-stat" class="spacer" style="font-size:12px;color:#8a8f9a;"></span>
  </div>
  <div id="scrubber" hidden>
    <button type="button" class="btn" id="tl-play">▶ Play</button>
    <span id="tl-from"></span><input type="range" id="tl-range" min="0" max="100" value="100"><span id="tl-to"></span>
  </div>
  <div id="legend"></div>
  <p class="note" id="path-hint" hidden>Path mode: click start point, then end point.</p>
  <div id="graph-wrap">
    <svg id="map" role="img" aria-label="Operator fund-flow graph"></svg>
    <svg id="mini" aria-hidden="true"></svg>
    <div id="tip"></div>
    <div id="panel" aria-live="polite"></div>
  </div>
</div>

<script>
"use strict";
// ---- bootstrap: prompt for admin key, fetch the admin-gated JSON ----
(function () {
  const qs = new URLSearchParams(location.search);
  if (qs.get("inv")) document.getElementById("inv").value = qs.get("inv");
  const savedKey = sessionStorage.getItem("recupero.adminkey");
  if (savedKey) document.getElementById("key").value = savedKey;
  const statusEl = document.getElementById("login-status");
  function setStatus(msg, err) { statusEl.textContent = msg; statusEl.className = err ? "err" : ""; }
  async function load() {
    const key = document.getElementById("key").value.trim();
    const inv = document.getElementById("inv").value.trim();
    if (!key || !inv) { setStatus("Enter admin key and investigation id.", true); return; }
    setStatus("Loading…", false);
    try {
      const resp = await fetch("/v1/operator/graph/" + encodeURIComponent(inv), { headers: { "X-Recupero-Admin-Key": key } });
      if (resp.status === 401 || resp.status === 403) { setStatus("Unauthorized — check the admin key.", true); return; }
      if (resp.status === 404) { setStatus("No case found for that investigation id.", true); return; }
      if (!resp.ok) { setStatus("Failed (" + resp.status + ").", true); return; }
      const data = await resp.json();
      sessionStorage.setItem("recupero.adminkey", key);
      setStatus((data.meta.nodeCount || 0) + " nodes · " + (data.meta.edgeCount || 0) + " edges" + (data.meta.riskScored ? " · risk-scored" : ""), false);
      document.getElementById("app").classList.add("show");
      initGraph(data, inv);
    } catch (e) { setStatus("Network error.", true); }
  }
  document.getElementById("load").addEventListener("click", load);
  document.getElementById("key").addEventListener("keydown", e => { if (e.key === "Enter") load(); });
  document.getElementById("inv").addEventListener("keydown", e => { if (e.key === "Enter") load(); });
})();

// ---- graph engine ----
let __graphInit = false;
function initGraph(DATA, viewId) {
  if (__graphInit) { location.reload(); return; }   // simplest re-load on second case
  __graphInit = true;
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("map"), mini = document.getElementById("mini"), tip = document.getElementById("tip"), panel = document.getElementById("panel");
  const nodeById = new Map(DATA.nodes.map(n => [n.id, n]));
  const clusterById = new Map((DATA.clusters || []).map(c => [c.id, c]));
  const usdNum = s => parseFloat(String(s || "0").replace(/[$,]/g, "")) || 0;
  const fmtUsd = v => "$" + Number(v).toLocaleString(undefined, { maximumFractionDigits: 2 });
  const EDGE_COL = "#454a55", EDGE_CROSS = "#C2410C";
  const RISK_LABEL = { "SANCTIONED": "Sanctioned", "CRITICAL": "Critical", "HIGH-RISK": "High risk", "MODERATE": "Moderate", "CLEAN": "Clean" };

  const STATUS = {};
  for (const n of DATA.nodes) STATUS[n.status] = { label: n.statusLabel, color: n.statusColor };
  for (const c of (DATA.clusters || [])) STATUS[c.status] = { label: c.statusLabel, color: c.statusColor };
  const statusColor = st => (STATUS[st] && STATUS[st].color) || "#94A3B8";
  const statusLabel = st => (STATUS[st] && STATUS[st].label) || st;

  const VK = "recupero.op." + (viewId || "case");
  const expanded = new Set(), statusOff = new Set();
  let minUsd = 0, asset = "", timeCutoff = null, layout = "force", colorBy = "recoverability";
  let pathMode = false, pickA = null;
  const pathNodes = new Set(), pathEdges = new Set();
  let selected = null, isolated = null;
  const expandedHops = new Set();   // "address|direction" already pulled in
  let annotations = {};             // node_id -> note (server-backed)
  const adminKey = () => sessionStorage.getItem("recupero.adminkey") || "";
  try { const s = JSON.parse(localStorage.getItem(VK) || "null"); if (s) { if (["force","flow","value","radial"].includes(s.layout)) layout = s.layout; (s.expanded||[]).forEach(c=>expanded.add(c)); (s.statusOff||[]).forEach(x=>statusOff.add(x)); minUsd=+s.minUsd||0; asset=s.asset||""; if (s.colorBy) colorBy=s.colorBy; } } catch(e){}
  function saveState(){ try{ localStorage.setItem(VK, JSON.stringify({layout,expanded:[...expanded],statusOff:[...statusOff],minUsd,asset,colorBy})); }catch(e){} }

  const maxEdgeUsd = Math.max(1, ...DATA.edges.map(e => e.totalUsdNumeric || 0));
  const maxDepth = (DATA.meta && DATA.meta.maxDepth) || 1;
  const hasRisk = DATA.nodes.some(n => n.risk);
  if (!hasRisk) document.getElementById("color-by").parentElement.style.display = "none";
  document.getElementById("meta-stat").textContent = DATA.meta.totalUsdTraced ? ("traced " + DATA.meta.totalUsdTraced) : "";

  function nodeFill(n) { return colorBy === "risk" ? (n.riskColor || "#64748B") : n.color; }

  function buildView() {
    const idOf = new Map(), vnodes = [], seen = new Set();
    for (const n of DATA.nodes) {
      const cid = n.clusterId;
      if (cid && clusterById.has(cid) && !expanded.has(cid)) {
        const c = clusterById.get(cid);
        if (statusOff.has(c.status)) { idOf.set(n.id, null); continue; }
        idOf.set(n.id, cid);
        if (!seen.has(cid)) { seen.add(cid); vnodes.push({ id:c.id, kind:"cluster", label:c.label, status:c.status, statusLabel:c.statusLabel, color:c.statusColor, riskColor:"#64748B", size:c.size, memberIds:c.memberIds||[], depth:clusterDepth(c), inboundUsd:c.inboundUsd, outboundUsd:c.outboundUsd, total:usdNum(c.inboundUsd)+usdNum(c.outboundUsd), inByCategory:aggCat(c.memberIds,"inByCategory"), outByCategory:aggCat(c.memberIds,"outByCategory") }); }
      } else {
        if (statusOff.has(n.status)) { idOf.set(n.id, null); continue; }
        idOf.set(n.id, n.id);
        vnodes.push({ id:n.id, kind:"node", label:n.label, short:n.short, status:n.status, statusLabel:n.statusLabel, color:n.statusColor, riskColor:n.riskColor, risk:n.risk, indirectExposureUsd:n.indirectExposureUsd, chain:n.chain, chainColor:n.chainColor, inboundUsd:n.inboundUsd, outboundUsd:n.outboundUsd, explorerUrl:n.explorerUrl, clusterId:n.clusterId, depth:n.depth||0, total:usdNum(n.inboundUsd)+usdNum(n.outboundUsd), inByCategory:n.inByCategory||{}, outByCategory:n.outByCategory||{} });
      }
    }
    const agg = new Map();
    for (const e of DATA.edges) {
      const s = idOf.get(e.source), t = idOf.get(e.target);
      if (!s || !t || s === t) continue;
      const k = s + "␟" + t; let a = agg.get(k);
      if (!a) { a = { id:k, source:s, target:t, usd:0, count:0, cross:false, assets:new Set(), first:null, last:null, transfers:[], txMore:0 }; agg.set(k,a); }
      a.usd += e.totalUsdNumeric||0; a.count += e.transferCount||0; a.cross = a.cross || !!e.isCrossChain;
      if (e.dominantSymbol) a.assets.add(e.dominantSymbol);
      if (e.firstTime && (!a.first || e.firstTime < a.first)) a.first = e.firstTime;
      if (e.lastTime && (!a.last || e.lastTime > a.last)) a.last = e.lastTime;
      for (const tx of (e.transfers||[])) a.transfers.push(tx); a.txMore += e.txMore||0;
    }
    for (const a of agg.values()) { a.transfers.sort((x,y)=>(y.usd||0)-(x.usd||0)); if (a.transfers.length>14){ a.txMore += a.transfers.length-14; a.transfers = a.transfers.slice(0,14);} }
    return { nodes: vnodes, edges: [...agg.values()] };
  }
  function clusterDepth(c){ let d=Infinity; for (const m of (c.memberIds||[])){ const n=nodeById.get(m); if(n&&(n.depth||0)<d)d=n.depth||0; } return d===Infinity?0:d; }
  function aggCat(ids, field){ const o={}; for (const m of (ids||[])){ const n=nodeById.get(m); if(!n)continue; for (const [k,v] of Object.entries(n[field]||{})) o[k]=(o[k]||0)+v; } return o; }

  const pos = new Map(); let W = svg.clientWidth||1000, H = svg.clientHeight||560;
  const radialTarget = new Map();
  function computeRadial(view){ radialTarget.clear(); const byD=new Map(); for (const n of view.nodes){ if(!byD.has(n.depth))byD.set(n.depth,[]); byD.get(n.depth).push(n); } const cx=W/2,cy=H/2; for (const [d,arr] of byD){ const r=d===0?0:90+d*110; arr.forEach((n,i)=>{ const ang=(i/arr.length)*2*Math.PI-Math.PI/2; radialTarget.set(n.id,{x:cx+r*Math.cos(ang),y:cy+r*Math.sin(ang)}); }); } }
  function seedPositions(view){ const cx=W/2,cy=H/2; for (const n of view.nodes){ if(pos.has(n.id))continue; let sx=cx+(Math.random()-.5)*W*.6, sy=cy+(Math.random()-.5)*H*.6; if(n.kind==="node"&&n.clusterId&&pos.has(n.clusterId)){const p=pos.get(n.clusterId);sx=p.x+(Math.random()-.5)*40;sy=p.y+(Math.random()-.5)*40;} if(n.status==="origin"){sx=(layout==="flow"||layout==="value")?80:cx;sy=cy;} pos.set(n.id,{x:sx,y:sy,vx:0,vy:0}); } }
  let view = buildView(), alpha = 1;
  const radius = n => Math.max(9, Math.min(30, 9 + Math.log10(n.total+1)*2.4)) + (n.kind==="cluster"?4:0);

  // value-flow: vertical rank within each depth column by total value
  const valRank = new Map();
  function computeValueRanks(v){ valRank.clear(); const byD=new Map(); for (const n of v.nodes){ if(!byD.has(n.depth))byD.set(n.depth,[]); byD.get(n.depth).push(n);} for (const arr of byD.values()){ arr.sort((a,b)=>b.total-a.total); arr.forEach((n,i)=>valRank.set(n.id,{i,count:arr.length})); } }

  function step(){
    const N=view.nodes, E=view.edges, damp=.9;
    for (let i=0;i<N.length;i++){ const a=pos.get(N[i].id); for (let j=i+1;j<N.length;j++){ const b=pos.get(N[j].id); let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy; if(d2<1){d2=1;dx=Math.random();dy=Math.random();} const rep=5200/d2*alpha,d=Math.sqrt(d2),ux=dx/d,uy=dy/d; a.vx+=ux*rep;a.vy+=uy*rep;b.vx-=ux*rep;b.vy-=uy*rep; } }
    for (const e of E){ const a=pos.get(e.source),b=pos.get(e.target); if(!a||!b)continue; let dx=b.x-a.x,dy=b.y-a.y; const d=Math.sqrt(dx*dx+dy*dy)||1; const tgt=90+Math.log10((e.usd||0)+1)*9,f=(d-tgt)*.02*alpha,ux=dx/d,uy=dy/d; a.vx+=ux*f;a.vy+=uy*f;b.vx-=ux*f;b.vy-=uy*f; }
    const cx=W/2,cy=H/2,colW=(W-140)/Math.max(1,maxDepth);
    for (const n of N){ const p=pos.get(n.id);
      if (layout==="flow"||layout==="value"){ const tx=80+(n.depth||0)*colW; p.vx+=(tx-p.x)*.12*Math.max(alpha,.25); if(layout==="value"){ const r=valRank.get(n.id); if(r){ const ty=(H/(r.count+1))*(r.i+1); p.vy+=(ty-p.y)*.10*Math.max(alpha,.25);} else p.vy+=(cy-p.y)*.01*alpha; } else p.vy+=(cy-p.y)*.01*alpha; }
      else if (layout==="radial"){ const t=radialTarget.get(n.id); if(t){ p.vx+=(t.x-p.x)*.10*Math.max(alpha,.25); p.vy+=(t.y-p.y)*.10*Math.max(alpha,.25);} }
      else { p.vx+=(cx-p.x)*.006*alpha; p.vy+=(cy-p.y)*.006*alpha; }
      if(p.fx!=null){p.x=p.fx;p.y=p.fy;p.vx=0;p.vy=0;continue;}
      p.vx*=damp;p.vy*=damp;p.x+=Math.max(-30,Math.min(30,p.vx));p.y+=Math.max(-30,Math.min(30,p.vy));
    }
    alpha*=.985; if(alpha<.02)alpha=.02;
  }

  const root=document.createElementNS(NS,"g"); svg.appendChild(root);
  const gE=document.createElementNS(NS,"g"); root.appendChild(gE);
  const gN=document.createElementNS(NS,"g"); root.appendChild(gN);
  let edgeEls=[], nodeEls=[];

  function render(){
    gE.replaceChildren(); gN.replaceChildren(); edgeEls=[]; nodeEls=[];
    for (const e of view.edges){ const ln=document.createElementNS(NS,"path"); ln.setAttribute("class","edge"+(e.cross?" cross":"")); ln.setAttribute("stroke",e.cross?EDGE_CROSS:EDGE_COL); ln.setAttribute("stroke-width",String(Math.max(1,Math.min(7,Math.log10((e.usd||0)+1)*.9)))); ln.__e=e; ln.addEventListener("mouseenter",ev=>edgeTip(ev,e)); ln.addEventListener("mouseleave",hideTip); ln.addEventListener("click",ev=>{ev.stopPropagation();selectEdge(e);}); gE.appendChild(ln); edgeEls.push(ln); }

  async function expandNode(n, direction, btn){
    const tag = n.id + "|" + direction;
    if (expandedHops.has(tag)) { if(btn) btn.textContent = "✓ done"; return; }
    const key = sessionStorage.getItem("recupero.adminkey") || "";
    const orig = btn ? btn.textContent : "";
    if (btn) { btn.textContent = "…"; btn.disabled = true; }
    try {
      const url = "/v1/operator/expand?chain=" + encodeURIComponent(n.chain || "") +
        "&address=" + encodeURIComponent(n.id) + "&direction=" + direction + "&limit=40";
      const resp = await fetch(url, { headers: { "X-Recupero-Admin-Key": key } });
      if (!resp.ok) { if(btn){ btn.textContent = (resp.status===503? "unavailable" : "failed "+resp.status); btn.disabled=false; } return; }
      const data = await resp.json();
      expandedHops.add(tag);
      mergeExpansion(n, data);
      if (btn) btn.textContent = "+" + (data.meta.counterpartyCount||0) + (data.meta.truncated? " (capped)" : "");
    } catch (e) { if(btn){ btn.textContent = "error"; btn.disabled = false; } }
  }
  async function watchNode(n, btn){
    const orig = btn ? btn.textContent : "";
    if (btn) { btn.textContent = "…"; btn.disabled = true; }
    try {
      const r = await fetch(API + "/watch", { method: "POST",
        headers: { "X-Recupero-Admin-Key": adminKey(), "Content-Type": "application/json" },
        body: JSON.stringify({ address: n.id, chain: n.chain || "", note: (annotations[n.id] || null) }) });
      if (btn) { btn.textContent = r.ok ? "👁 Watching" : ("failed " + r.status); btn.disabled = !r.ok ? false : true; }
    } catch (e) { if (btn) { btn.textContent = "error"; btn.disabled = false; } }
  }
  function mergeExpansion(parent, data){
    const pdepth = (nodeById.get(parent.id) || {}).depth || 0;

      if (!nodeById.has(nn.id)) { nn.depth = pdepth + 1; DATA.nodes.push(nn); nodeById.set(nn.id, nn); }
    }
    const ek = e => e.source + ">" + e.target;
    const existing = new Map(DATA.edges.map(e => [ek(e), e]));
    for (const ne of (data.edges||[])) {
      const k = ek(ne), ex = existing.get(k);
      if (ex) { ex.totalUsdNumeric = (ex.totalUsdNumeric||0) + (ne.totalUsdNumeric||0); ex.transferCount = (ex.transferCount||0) + (ne.transferCount||0); }
      else { DATA.edges.push(ne); existing.set(k, ne); }
    }
    document.getElementById("meta-stat").textContent = DATA.nodes.length + " nodes · " + DATA.edges.length + " edges (live)";
    rebuild(true); selectNode(parent.id);
  }

  }

  function drawMini(){ if(!view.nodes.length){mini.replaceChildren();return;} const mw=178,mh=112; let a=Infinity,b=Infinity,c=-Infinity,d=-Infinity; for(const n of view.nodes){const p=pos.get(n.id);a=Math.min(a,p.x);b=Math.min(b,p.y);c=Math.max(c,p.x);d=Math.max(d,p.y);} const bw=(c-a)||1,bh=(d-b)||1,pad=8,s=Math.min((mw-2*pad)/bw,(mh-2*pad)/bh); const ox=pad-a*s+(mw-2*pad-bw*s)/2, oy=pad-b*s+(mh-2*pad-bh*s)/2; mini.__t={s,ox,oy}; const frag=document.createDocumentFragment(); for(const n of view.nodes){const p=pos.get(n.id);const dot=document.createElementNS(NS,"circle");dot.setAttribute("cx",p.x*s+ox);dot.setAttribute("cy",p.y*s+oy);dot.setAttribute("r","1.7");dot.setAttribute("fill",nodeFill(n));frag.appendChild(dot);} const vx0=-tx/scale,vy0=-ty/scale,vx1=(W-tx)/scale,vy1=(H-ty)/scale; const rect=document.createElementNS(NS,"rect");rect.setAttribute("class","mini-vp");rect.setAttribute("x",vx0*s+ox);rect.setAttribute("y",vy0*s+oy);rect.setAttribute("width",Math.max(2,(vx1-vx0)*s));rect.setAttribute("height",Math.max(2,(vy1-vy0)*s));frag.appendChild(rect); mini.replaceChildren(frag); }
  mini.addEventListener("click",ev=>{const t=mini.__t;if(!t)return;const r=mini.getBoundingClientRect();const wx=(ev.clientX-r.left-t.ox)/t.s,wy=(ev.clientY-r.top-t.oy)/t.s;tx=W/2-wx*scale;ty=H/2-wy*scale;applyT();});

  function download(href,name){const a=document.createElement("a");a.href=href;a.download=name;document.body.appendChild(a);a.click();a.remove();}
  function exportPNG(){ try{ const clone=svg.cloneNode(true);clone.setAttribute("xmlns",NS);clone.setAttribute("width",W);clone.setAttribute("height",H); const st=document.createElementNS(NS,"style");st.textContent=".edge{fill:none}.node text{font-size:11px;fill:#e6e7eb}.node .count{font-weight:700;fill:#fff}";clone.insertBefore(st,clone.firstChild); const bg=document.createElementNS(NS,"rect");bg.setAttribute("width","100%");bg.setAttribute("height","100%");bg.setAttribute("fill","#0f1014");clone.insertBefore(bg,clone.firstChild); const xml=new XMLSerializer().serializeToString(clone); const img=new Image(); img.onload=()=>{const cv=document.createElement("canvas");cv.width=W*2;cv.height=H*2;const cx=cv.getContext("2d");cx.scale(2,2);cx.drawImage(img,0,0);download(cv.toDataURL("image/png"),"operator-graph.png");}; img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml); }catch(e){} }
  function exportCSV(){ const esc=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"'; const rows=[["From","To","USD","Transfers","Assets","First","Last","Cross-chain","SourceRisk","TargetRisk"]]; const riskOf=id=>{const n=nodeById.get(id);return n&&n.risk?n.risk.verdict:"";}; for(const e of DATA.edges){rows.push([nlbl(e.source),nlbl(e.target),e.totalUsdNumeric||0,e.transferCount||0,e.dominantSymbol||"",e.firstTime||"",e.lastTime||"",e.isCrossChain?"yes":"no",riskOf(e.source),riskOf(e.target)]);} const csv=rows.map(r=>r.map(esc).join(",")).join("\r\n"); download("data:text/csv;charset=utf-8,"+encodeURIComponent(csv),"operator-graph.csv"); }
  function nlbl(id){const n=nodeById.get(id);return n?(n.label||n.short||id):id;}

  document.getElementById("search").addEventListener("input",ev=>{const q=ev.target.value.trim().toLowerCase();if(!q){clearIsolate();return;}let hit=null;for(const g of nodeEls){const n=g.__n;const m=(n.label||"").toLowerCase().includes(q)||(n.id||"").toLowerCase().includes(q)||(n.short||"").toLowerCase().includes(q);g.classList.toggle("dim",!m);if(m&&!hit)hit=n;}for(const ln of edgeEls)ln.classList.add("dim");if(hit){const p=pos.get(hit.id);tx=W/2-p.x*scale;ty=H/2-p.y*scale;applyT();}});
  document.getElementById("color-by").addEventListener("change",ev=>{colorBy=ev.target.value;recolor();saveState();});
  function setLayout(l){layout=l;for(const [id,key] of [["lay-force","force"],["lay-flow","flow"],["lay-value","value"],["lay-radial","radial"]])document.getElementById(id).classList.toggle("on",key===l);computeRadial(view);computeValueRanks(view);alpha=.9;saveState();setTimeout(fit,700);}
  document.getElementById("lay-force").onclick=()=>setLayout("force");
  document.getElementById("lay-flow").onclick=()=>setLayout("flow");
  document.getElementById("lay-value").onclick=()=>setLayout("value");
  document.getElementById("lay-radial").onclick=()=>setLayout("radial");
  document.getElementById("btn-path").onclick=function(){pathMode=!pathMode;this.classList.toggle("on",pathMode);document.getElementById("path-hint").hidden=!pathMode;if(!pathMode)clearPath();};
  document.getElementById("btn-expand").onclick=()=>{for(const c of clusterById.keys())expanded.add(c);rebuild(true);};
  document.getElementById("btn-collapse").onclick=()=>{expanded.clear();rebuild(true);};
  document.getElementById("btn-reset").onclick=()=>{tx=0;ty=0;scale=1;applyT();clearSelection();clearPath();};
  document.getElementById("btn-fit").onclick=fit;
  document.getElementById("btn-png").onclick=exportPNG;
  document.getElementById("btn-csv").onclick=exportCSV;

  const fmin=document.getElementById("f-min"),fminLab=document.getElementById("f-min-lab");
  fmin.value=String(Math.round((minUsd/maxEdgeUsd)*100));
  const setMin=()=>{minUsd=(fmin.value/100)*maxEdgeUsd;fminLab.textContent=fmtUsd(minUsd);applyFilters();saveState();};
  fmin.addEventListener("input",setMin); fminLab.textContent=fmtUsd(minUsd);
  const fasset=document.getElementById("f-asset");
  for(const a of (DATA.meta.assets||[])){const o=document.createElement("option");o.value=a;o.textContent=a;fasset.appendChild(o);}
  if(!(DATA.meta.assets||[]).length)fasset.parentElement.style.display="none";
  if(asset)fasset.value=asset;
  fasset.addEventListener("change",()=>{asset=fasset.value;applyFilters();saveState();});

  const trng=DATA.meta.timeRange;
  if(trng&&trng.min&&trng.max&&trng.min!==trng.max){ const scrub=document.getElementById("scrubber");scrub.hidden=false; const d0=new Date(trng.min+"T00:00:00Z").getTime(),d1=new Date(trng.max+"T00:00:00Z").getTime(); document.getElementById("tl-from").textContent=trng.min; const slider=document.getElementById("tl-range"),toLab=document.getElementById("tl-to");toLab.textContent=trng.max; const setFrom=()=>{const f=slider.value/100;const iso=new Date(d0+f*(d1-d0)).toISOString().slice(0,10);timeCutoff=(+slider.value>=100)?null:iso;toLab.textContent=iso;applyFilters();}; slider.addEventListener("input",setFrom); let playing=null;const pb=document.getElementById("tl-play"); pb.onclick=()=>{if(playing){clearInterval(playing);playing=null;pb.textContent="▶ Play";return;}if(+slider.value>=100)slider.value=0;pb.textContent="❚❚ Pause";playing=setInterval(()=>{slider.value=Math.min(100,+slider.value+2);setFrom();if(+slider.value>=100){clearInterval(playing);playing=null;pb.textContent="▶ Play";}},120);}; }

  function fit(){ if(!view.nodes.length)return; let a=Infinity,b=Infinity,c=-Infinity,d=-Infinity; for(const n of view.nodes){const p=pos.get(n.id);a=Math.min(a,p.x);b=Math.min(b,p.y);c=Math.max(c,p.x);d=Math.max(d,p.y);} const bw=(c-a)||1,bh=(d-b)||1,pad=70; scale=Math.max(.2,Math.min(2,Math.min((W-pad)/bw,(H-pad)/bh))); tx=W/2-((a+c)/2)*scale; ty=H/2-((b+d)/2)*scale; applyT(); }
  window.addEventListener("resize",()=>{W=svg.clientWidth||W;H=svg.clientHeight||H;computeRadial(view);});

  // ---- server-backed annotations + saved views (Phase 3.9) ----
  const API = "/v1/operator/graph/" + encodeURIComponent(viewId || "");
  async function saveAnnotation(nodeId, note){
    try{ await fetch(API+"/annotations",{method:"PUT",headers:{"X-Recupero-Admin-Key":adminKey(),"Content-Type":"application/json"},body:JSON.stringify({node_id:nodeId,note:note||""})}); }catch(e){}
  }
  async function loadAnnotations(){
    try{ const r=await fetch(API+"/annotations",{headers:{"X-Recupero-Admin-Key":adminKey()}}); if(r.ok){ const d=await r.json(); annotations=d.annotations||{}; } }catch(e){}
  }
  function currentState(){ return {layout, expanded:[...expanded], statusOff:[...statusOff], minUsd, asset, colorBy}; }
  function applyState(s){
    if(!s)return;
    if(["force","flow","value","radial"].includes(s.layout))layout=s.layout;
    expanded.clear(); (s.expanded||[]).forEach(c=>expanded.add(c));
    statusOff.clear(); (s.statusOff||[]).forEach(x=>statusOff.add(x));
    minUsd=+s.minUsd||0; asset=s.asset||""; if(s.colorBy)colorBy=s.colorBy;
    document.getElementById("color-by").value=colorBy;
    document.getElementById("f-min").value=String(Math.round((minUsd/maxEdgeUsd)*100));
    document.getElementById("f-min-lab").textContent=fmtUsd(minUsd);
    const fa=document.getElementById("f-asset"); if(fa)fa.value=asset;
    for(const [id,k] of [["lay-force","force"],["lay-flow","flow"],["lay-value","value"],["lay-radial","radial"]])document.getElementById(id).classList.toggle("on",k===layout);
    rebuild(true); saveState();
  }
  async function refreshSnapshots(){
    try{ const r=await fetch(API+"/snapshots",{headers:{"X-Recupero-Admin-Key":adminKey()}}); if(!r.ok)return; const d=await r.json(); const sel=document.getElementById("snap-list"); sel.replaceChildren(); const o0=document.createElement("option");o0.value="";o0.textContent="Saved views…";sel.appendChild(o0); for(const s of (d.snapshots||[])){ const o=document.createElement("option");o.value=s.name;o.textContent=s.name;sel.appendChild(o);} }catch(e){}
  }
  document.getElementById("btn-save-view").onclick=async()=>{
    const name=(prompt("Save current view as:")||"").trim(); if(!name)return;
    try{ const r=await fetch(API+"/snapshots",{method:"PUT",headers:{"X-Recupero-Admin-Key":adminKey(),"Content-Type":"application/json"},body:JSON.stringify({name,state:currentState()})}); if(r.ok)refreshSnapshots(); else alert("Save failed ("+r.status+")"); }catch(e){alert("Save failed");}
  };
  document.getElementById("snap-list").onchange=async(ev)=>{
    const name=ev.target.value; if(!name)return;
    try{ const r=await fetch(API+"/snapshots/"+encodeURIComponent(name),{headers:{"X-Recupero-Admin-Key":adminKey()}}); if(r.ok){ const d=await r.json(); applyState(d.state); } }catch(e){}
  };

  document.getElementById("color-by").value=colorBy;
  for(const [id,key] of [["lay-force","force"],["lay-flow","flow"],["lay-value","value"],["lay-radial","radial"]])document.getElementById(id).classList.toggle("on",key===layout);
  loadAnnotations(); refreshSnapshots();
  rebuild(false); loop(); setTimeout(fit,1400);
}
</script>
</body>
