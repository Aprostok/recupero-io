<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recupero &#8211; SAR / STR Filing (DRAFT)</title>
<link rel="stylesheet" href="/v1/console/app.css">
<style>
  /* page-specific: SAR / STR filing (draft) */
  .card .v { font-size: 1.05rem; }
  .panel { background: var(--surface); border: 1px solid var(--hair); border-radius: var(--r); padding: .75rem 1rem; margin-bottom: 1rem; font-size: .82rem; box-shadow: var(--shadow-sm); }
  .panel .row { display: flex; gap: .6rem; margin-bottom: .3rem; align-items: baseline; }
  .panel .k { color: var(--ink-faint); flex-shrink: 0; min-width: 9rem; font-size: .74rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .narrative { white-space: pre-wrap; line-height: 1.6; font-size: .84rem; }
  h2 { margin: 1.4rem 0 .5rem; }
  /* jurisdiction pills row */
  .jur-pills { display: flex; gap: .45rem; margin: .7rem 0 .4rem; flex-wrap: wrap; }
  .jur-pill  { display: inline-flex; align-items: center; gap: .3rem; padding: .22rem .65rem;
    border-radius: 99px; font-size: .75rem; font-weight: 600; letter-spacing: .02em;
    background: var(--surface-2); border: 1.5px solid var(--hair); color: var(--ink-soft);
    transition: background .15s, border-color .15s, color .15s; cursor: default; }
  .jur-pill.active { background: var(--accent-soft,rgba(0,113,227,.1)); border-color: var(--accent);
    color: var(--accent); }
  .jur-pill .jur-flag { font-size: .9rem; }
  /* narrative section header */
  .nar-header { display: flex; align-items: center; justify-content: space-between; margin: 1.4rem 0 .5rem; }
  .nar-header h2 { margin: 0; }
  .nar-copy-btn { font-size: .72rem; color: var(--ink-soft); background: var(--surface-2);
    border: 1px solid var(--hair); border-radius: var(--r); padding: .18rem .55rem; cursor: pointer; }
  .nar-copy-btn:hover { color: var(--ink); border-color: var(--accent); }
</style>
</head>
<body>
  <h1>&#127963; SAR / STR Filing (DRAFT)</h1>
  <div class="sub">Suspicious-activity-report DRAFT context assembled from a single case&#8217;s freeze brief. Paste your
    operator key and a case id, pick a jurisdiction, then generate. Data is fetched directly from the admin-gated
    API (the key stays in a request header, never the URL).</div>

  <div class="bar">
    <input id="key" type="password" placeholder="X-Recupero-Admin-Key" size="34" autocomplete="off">
    <input id="case" type="text" placeholder="case_id" size="24" autocomplete="off">
    <select id="jur" title="Filing regime">
      <option value="us">us &#8211; FinCEN SAR (Form 111)</option>
      <option value="uk">uk &#8211; NCA SAR (POCA 2002)</option>
      <option value="eu">eu &#8211; AMLD STR (goAML)</option>
    </select>
    <button id="load">Generate Draft</button>
    <span id="msg"></span>
  </div>

  <div id="out"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  // Persist the key for the session only (not localStorage) -- clears on tab close.
  try { $("key").value = sessionStorage.getItem("rk_admin_key") || ""; } catch (e) {}

  function setMsg(t, cls) { var m = $("msg"); m.textContent = t || ""; m.className = cls || ""; }
  function clear() { $("out").innerHTML = ""; }

  function card(v, l) { return '<div class="card"><div class="v">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }
  function row(k, v) { return '<div class="row"><span class="k">' + esc(k) + '</span><span>' + esc(v) + '</span></div>'; }

  var _JUR_META = {
    "us": { flag: "&#127482;&#127480;", name: "FinCEN SAR" },
    "uk": { flag: "&#127468;&#127463;", name: "NCA SAR" },
    "eu": { flag: "&#127466;&#127482;", name: "goAML STR" }
  };

  function render(ctx) {
    ctx = ctx || {};
    var labels = ctx.labels || {};
    var activity = ctx.activity || {};
    var victim = ctx.victim || {};
    var jurKey = (ctx.jurisdiction_key || "us").toLowerCase();

    var html = '';

    // Jurisdiction pills strip
    html += '<div class="jur-pills">';
    ["us","uk","eu"].forEach(function(k) {
      var m = _JUR_META[k] || {};
      html += '<span class="jur-pill' + (k === jurKey ? " active" : "") + '">' +
              '<span class="jur-flag">' + (m.flag || "") + '</span>' +
              esc(k.toUpperCase()) + ' &middot; ' + esc(m.name || k) + '</span>';
    });
    html += '</div>';

    // DRAFT disclaimer
    html += '<div class="ai-disclaimer">' +
      '<div class="ai-disclaimer-icon">&#128196;</div>' +
      '<div class="ai-disclaimer-body">' +
        '<div class="ai-disclaimer-title">DRAFT &mdash; Recupero is NOT the filer</div>' +
        '<div class="ai-disclaimer-note">A ' + esc(labels.report_acronym || "SAR/STR") +
        ' is filed by an obligated financial institution (or, in the UK, a POCA-2002 reporter). ' +
        'This draft compresses the analyst&#8217;s work into a reviewable package; the obligated institution ' +
        'completes its identifiers + officer attestation and submits via the named portal.</div>' +
      '</div>' +
    '</div>';

    // Jurisdiction / form labels
    html += '<h2>&#127963;&thinsp;Filing regime</h2><div class="panel">' +
      row("Report",         (labels.report_acronym || "") + " &#8212; " + (labels.report_name || "")) +
      row("Regulator",      labels.regulator) +
      row("Form reference", labels.form_reference) +
      row("Statute",        labels.statute) +
      row("Filing portal",  labels.filing_portal) +
      row("Jurisdiction",   ctx.jurisdiction_key) +
      '</div>';

    // Key amounts / activity cards
    html += '<h2>&#128202;&thinsp;Activity summary</h2><div class="cards" id="sar-cards">' +
      card(activity.amount_usd || ctx.total_loss_usd || "$0.00", "Amount (USD)") +
      card((ctx.subjects || []).length, "Subjects") +
      card(activity.date_from || "&#8212;", "Activity from") +
      card(activity.date_to   || "&#8212;", "Activity to")  +
      '</div>';
    html += '<div class="panel">' +
      row("Case id",         ctx.case_id) +
      row("Incident date",   ctx.incident_date || "&#8212;") +
      row("Incident type",   ctx.incident_type || "&#8212;") +
      row("Victim",          (victim.name || "") + " (" + (victim.jurisdiction || "") + ")") +
      row("Generated at",    ctx.generated_at) +
      row("Characterization", activity.characterization || labels.characterization) +
      '</div>';

    // Subjects table
    html += '<h2>&#128100;&thinsp;Subjects</h2>';
    html += '<div id="sar-role-bar" style="margin:.15rem 0 .5rem"></div>';
    var subjects = ctx.subjects || [];
    if (!subjects.length) {
      html += '<p class="empty">No subjects derived from this brief.</p>';
    } else {
      html += '<div id="sar-subj-table"><table><thead><tr><th>Address</th><th>Chain</th><th>Role</th><th>Venue</th>' +
              '<th class="right">Amount (USD)</th></tr></thead><tbody>';
      subjects.forEach(function (s) {
        s = s || {};
        var role = (s.role || "").toLowerCase();
        var roleCls = role.indexOf("perpetrator") >= 0 ? "crit" : role.indexOf("mule") >= 0 ? "warn" : "";
        html += '<tr>' +
          '<td class="mono">' + esc(s.address) + '</td>' +
          '<td>' + (window.RC && window.RC.chainChip ? window.RC.chainChip(s.chain) : '<span class="chip">' + esc(s.chain) + '</span>') + '</td>' +
          '<td><span class="chip ' + roleCls + '">' + esc(s.role) + '</span></td>' +
          '<td>' + esc(s.venue) + '</td>' +
          '<td class="right">' + esc(s.amount_usd) + '</td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
    }

    // Narrative with copy button
    var narText = ctx.sar_narrative || "";
    html += '<div class="nar-header"><h2>&#128221;&thinsp;Narrative</h2>' +
            '<button class="nar-copy-btn" id="nar-copy-btn">Copy text</button></div>';
    html += '<div class="panel narrative" id="nar-text">' + esc(narText) + '</div>';

    // Timeline of key dates (date_from, incident_date, date_to)
    var _tlEvs = [];
    if (activity.date_from) _tlEvs.push({ label: "Activity start", type: "warn" });
    if (ctx.incident_date)  _tlEvs.push({ label: "Incident",       type: "crit" });
    if (activity.date_to)   _tlEvs.push({ label: "Activity end",   type: "" });
    if (_tlEvs.length > 1) {
      html += '<h2>&#128337;&thinsp;Activity timeline</h2>' +
              '<div id="sar-tl" style="padding:.55rem 1rem;background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:1rem"></div>';
    }
    $("out").innerHTML = html;

    // Post-render enhancements
    if (window.RC) {
      var sarCards = document.getElementById("sar-cards");
      if (sarCards) { window.RC.countUp(sarCards); window.RC.animateRings(sarCards); }
      var subjTable = document.getElementById("sar-subj-table");
      if (subjTable) { window.RC.staggerRows(subjTable); window.RC.attachSort(subjTable); window.RC.attachFilter(subjTable); }
      // Subject role distribution risk bar
      var sarRbEl = document.getElementById("sar-role-bar");
      if (sarRbEl && window.RC.buildRiskBar && subjects.length > 0) {
        var nPerp=0, nMule=0, nOther=0;
        subjects.forEach(function(s) {
          var ro = (s.role || "").toLowerCase();
          if (ro.indexOf("perpetrator") >= 0) { nPerp++; }
          else if (ro.indexOf("mule") >= 0 || ro.indexOf("intermediar") >= 0) { nMule++; }
          else { nOther++; }
        });
        var sarRsegs = [
          { label: "Perpetrator (" + nPerp  + ")", pct: nPerp,  cls: "crit" },
          { label: "Mule ("        + nMule  + ")", pct: nMule,  cls: "warn" },
          { label: "Other ("       + nOther + ")", pct: nOther, cls: "" }
        ].filter(function(s){return s.pct>0;});
        if (sarRsegs.length) window.RC.buildRiskBar(sarRbEl, sarRsegs, { height: 7, showLabels: true });
      }
      var sarTl = document.getElementById("sar-tl");
      if (sarTl && window.RC.buildTimeline && _tlEvs.length > 1) {
        window.RC.buildTimeline(sarTl, _tlEvs, { height: 52 });
      }
    }

    // Narrative copy button
    var copyBtn = document.getElementById("nar-copy-btn");
    if (copyBtn && narText) {
      copyBtn.addEventListener("click", function() {
        try {
          navigator.clipboard.writeText(narText).then(function() {
            copyBtn.textContent = "Copied!";
            setTimeout(function() { copyBtn.textContent = "Copy text"; }, 1800);
          });
        } catch(e) { copyBtn.textContent = "Copy text"; }
      });
    }
  }

  function key() { return ($("key").value || "").trim(); }
  function caseId() { return ($("case").value || "").trim(); }
  function jur() { return ($("jur").value || "us").trim(); }

  function load() {
    var k = key();
    if (!k) { setMsg("Enter the admin key.", "err"); return; }
    var cid = caseId();
    if (!cid) { setMsg("Enter a case id.", "err"); return; }
    var j = jur();
    try { sessionStorage.setItem("rk_admin_key", k); } catch (e) {}
    setMsg("Generating&#8230;");
    clear();
    if (window.RC) { $("out").innerHTML = window.RC.skeletonCards(4) + window.RC.skeletonTable(4, 5); }
    fetch("/v1/sar-filing?case_id=" + encodeURIComponent(cid) + "&jurisdiction=" + encodeURIComponent(j),
          { headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) {
        if (res.status === 400) throw new Error("Bad request &#8212; check the case id / jurisdiction.");
        if (res.status === 401) throw new Error("Unauthorized &#8212; check the key.");
        if (res.status === 404) throw new Error("Case not found (no freeze_brief.json &#8212; run emit-brief first).");
        if (res.status === 503) throw new Error("API not configured, or draft unavailable.");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (ctx) {
        render(ctx);
        setMsg("Drafted " + new Date().toLocaleTimeString(), "ok");
        if (window.RC) { window.RC.toast("SAR draft ready &#10003;", "ok"); }
      })
      .catch(function (e) {
        setMsg(e.message, "err");
        if (window.RC) { window.RC.toast(e.message, "err"); }
      });
  }

  $("load").addEventListener("click", load);
  $("case").addEventListener("keydown", function (e) { if (e.key === "Enter") load(); });

  // Deep-link support: prefill + auto-load from ?case_id=
  (function () {
    try {
      var _qs = new URLSearchParams(window.location.search);
      var _cid = _qs.get("case_id");
      if (_cid) { $("case").value = _cid; }
      var _jur = _qs.get("jurisdiction");
      if (_jur && $("jur")) { $("jur").value = _jur; }
      if (_cid && $("key") && $("key").value) { load(); }
    } catch (e) {}
  })();
})();
</script>
<script src="/v1/console/app.js" defer></script>
</body>
</html>
