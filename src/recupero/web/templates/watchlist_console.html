<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recupero &#8211; Watchlist Console</title>
<link rel="stylesheet" href="/v1/console/app.css">
<style>
  /* page-specific: watchlist */
  .card.alert .v { color: var(--crit); } .card.ok .v { color: var(--ok); }
  tr.moved td { background: var(--crit-soft); }
  td.age.stale { color: var(--crit); font-weight: 600; }
  .badge.moved   { background: var(--crit-soft); color: var(--crit); }
  .badge.ok      { background: rgba(29,138,78,.12); color: var(--ok); }
  .badge.new     { background: var(--surface-2); color: var(--ink-soft); }
  /* monitor status distribution bar */
  .mon-dist-wrap { margin: .6rem 0 .85rem; }
  .mon-dist-bar  { display: flex; height: 7px; border-radius: 99px; overflow: hidden; background: var(--hair-strong); }
  .mon-dist-seg  { height: 100%; transition: width .75s cubic-bezier(.32,.72,0,1); }
  .mon-dist-legend { display: flex; flex-wrap: wrap; gap: .3rem .8rem; margin-top: .38rem; }
  .mon-dist-item { display: flex; align-items: center; gap: .3rem; font-size: .7rem; color: var(--ink-soft); }
  .mon-dist-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  /* chain chip rows */
  .chips-row .chain-amount { font-size: .67rem; color: var(--ink-faint); margin-left: .18rem; }
  /* auto-refresh label */
  label.autolabel { display: inline-flex; align-items: center; gap: .35rem; font-size: .8rem; color: var(--ink-soft); cursor: pointer; user-select: none; }
  label.autolabel input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
</style>
</head>
<body>
  <h1>&#128752; Watchlist Console</h1>
  <div class="sub">Live view of everything under monitoring. Paste your operator key to load;
    data is fetched directly from the admin-gated API (the key stays in a request header, never the URL).</div>

  <div class="bar">
    <input id="key" type="password" placeholder="X-Recupero-Admin-Key" size="34" autocomplete="off">
    <input id="inv" type="text" placeholder="investigation id (optional)" size="22" autocomplete="off">
    <button id="load">Load</button>
    <button id="run" class="secondary">Run check now</button>
    <label class="autolabel"><input type="checkbox" id="auto"> auto-refresh 60s</label>
    <span class="live-dot" id="live-dot" style="display:none"></span>
    <span id="msg"></span>
  </div>

  <div class="cards" id="cards"></div>
  <div id="chipwrap"></div>
  <div id="tablewrap"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  // Persist the key for the session only (not localStorage) -- clears on tab close.
  try { $("key").value = sessionStorage.getItem("rk_admin_key") || ""; } catch (e) {}

  function setMsg(t, cls) { var m = $("msg"); m.textContent = t || ""; m.className = cls || ""; }

  function card(v, l, cls) { return '<div class="card ' + (cls||"") + '"><div class="v">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  // Build a coloured .chip from a status emoji + name string to detect risk level
  function statusChipCls(status) {
    var s = (status || "").toLowerCase();
    if (s.includes("move") || s.includes("alert") || s.includes("critical")) return "crit";
    if (s.includes("stale") || s.includes("warn") || s.includes("high"))     return "warn";
    if (s.includes("present") || s.includes("ok") || s.includes("active"))   return "ok";
    return "";
  }

  function render(ov) {
    $("cards").innerHTML =
      card(ov.n_items,                   "Addresses watched", "") +
      card(ov.total_watched_usd_human,   "Total under watch",  "") +
      card(ov.n_moved,                   "Moved since check",  ov.n_moved ? "alert" : "") +
      card(ov.total_still_present_usd_human, "Still present", "ok") +
      card(ov.n_stale,                   "Due for re-check",  ov.n_stale ? "alert" : "") +
      card(ov.n_never_checked,           "Never checked",      "");

    // ── Monitor status distribution bar ────────────────────────────────
    var total = ov.n_items || 0;
    var distHtml = "";
    if (total > 0) {
      var nMoved  = ov.n_moved || 0;
      var nStale  = ov.n_stale || 0;
      var nNever  = ov.n_never_checked || 0;
      var nPresent = Math.max(0, total - nMoved - nStale - nNever);
      var segs = [
        { n: nMoved,   color: "var(--crit)",         label: "Moved" },
        { n: nStale,   color: "var(--warn)",         label: "Stale" },
        { n: nPresent, color: "var(--ok)",           label: "Present" },
        { n: nNever,   color: "var(--ink-faint)",    label: "Never checked" }
      ];
      var bar = '<div class="mon-dist-bar">';
      segs.forEach(function(s) {
        if (!s.n) return;
        bar += '<div class="mon-dist-seg" style="width:' + Math.round(s.n / total * 100) + '%;background:' + s.color + '" title="' + s.label + ': ' + s.n + '"></div>';
      });
      bar += '</div>';
      var lgd = '<div class="mon-dist-legend">';
      segs.forEach(function(s) {
        if (!s.n) return;
        lgd += '<div class="mon-dist-item"><span class="mon-dist-dot" style="background:' + s.color + '"></span>' + esc(s.label) + ' &middot; ' + esc(s.n) + '</div>';
      });
      lgd += '</div>';
      distHtml = '<div class="mon-dist-wrap">' + bar + lgd + '</div>';
    }

    // Chip breakdowns — styled chip rows
    var chipHtml = distHtml;

    var byStatus = ov.by_status || [];
    if (byStatus.length) {
      chipHtml += '<div class="chips-row"><span class="chips-label">By status</span>';
      byStatus.forEach(function (s) {
        var cls = statusChipCls(s.status || "");
        chipHtml += '<span class="chip ' + cls + '">' + esc(s.emoji ? s.emoji + " " : "") + esc(s.status) + ' &middot; ' + esc(s.n) + '</span>';
      });
      chipHtml += '</div>';
    }

    var byChain = ov.by_chain || [];
    if (byChain.length) {
      chipHtml += '<div class="chips-row"><span class="chips-label">By chain</span>';
      byChain.forEach(function (c) {
        var chp = (window.RC && window.RC.chainChip) ? window.RC.chainChip(c.chain) : '<span class="chip">' + esc(c.chain) + '</span>';
        chipHtml += chp + '<span class="chain-amount">' + esc(c.n) + ' &middot; ' + esc(c.usd_human) + '</span>';
      });
      chipHtml += '</div>';
    }
    $("chipwrap").innerHTML = chipHtml;

    var rows = ov.rows || [];
    if (!rows.length) { $("tablewrap").innerHTML = '<p class="sub">Nothing under watch yet.</p>'; return; }
    var h = '<table><thead><tr>' +
            '<th>Status</th><th>Address</th><th>Chain</th><th>Asset</th>' +
            '<th class="right">Balance USD</th><th>Movement</th><th>&#916; prior</th><th>Last checked</th>' +
            '<th class="right">Days</th><th>Issuer / label</th></tr></thead><tbody>';
    rows.forEach(function (r) {
      var addr = r.explorer_url
        ? '<a href="' + esc(r.explorer_url) + '" target="_blank" rel="noopener" class="mono">' + esc(r.address) + '</a>'
        : '<span class="mono">' + esc(r.address) + '</span>';

      // Status badge: derive color class from movement + stale flag
      var sBadgeCls = r.movement === "moved" ? "critical" : (r.stale ? "high" : "ok");
      var statusHtml = (r.status_emoji ? esc(r.status_emoji) + '&thinsp;' : '') +
                       '<span class="badge ' + sBadgeCls + '">' + esc(r.status_label || "active") + '</span>';

      // Delta coloring
      var dv = r.last_delta_usd_human;
      var dvNum = parseFloat((dv || "").replace(/[^0-9.-]/g, ""));
      var dvHtml = (dv == null || dv === "—" || dv === "") ? '<span style="color:var(--ink-faint)">&#8212;</span>'
                 : (!isNaN(dvNum) && dvNum > 0) ? '<span class="delta-pos">' + esc(dv) + '</span>'
                 : (!isNaN(dvNum) && dvNum < 0) ? '<span class="delta-neg">' + esc(dv) + '</span>'
                 : esc(dv);

      h += '<tr class="' + (r.movement === "moved" ? "moved" : "") + '">' +
        '<td>' + statusHtml + '</td>' +
        '<td>' + addr + '</td>' +
        '<td>' + (window.RC ? window.RC.chainChip(r.chain) : '<span class="chip">' + esc(r.chain) + '</span>') + '</td>' +
        '<td><span class="chip">' + esc(r.asset_symbol) + '</span></td>' +
        '<td class="right mono">' + esc(r.balance_usd_human) + '</td>' +
        '<td><span class="badge ' + esc(r.movement_class) + '">' + esc(r.movement_badge) + '</span></td>' +
        '<td class="right">' + dvHtml + '</td>' +
        '<td class="age ' + (r.stale ? "stale" : "") + '" title="' + esc(r.last_checked_human) + '">' + esc(r.age_human) + '</td>' +
        '<td class="right">' + esc(r.days_watched) + '</td>' +
        '<td>' + esc(r.issuer) + (r.label_name && r.label_name !== "&#8212;" && r.label_name !== "—" ? ' <span style="color:var(--ink-faint)">&middot;</span> ' + esc(r.label_name) : "") + '</td>' +
        '</tr>';
    });
    h += '</tbody></table>';
    $("tablewrap").innerHTML = h;
    if (window.RC) {
      window.RC.staggerRows($("tablewrap"));
      window.RC.attachSort($("tablewrap"));
    }
  }

  function key() { return ($("key").value || "").trim(); }

  function load() {
    var k = key();
    if (!k) { setMsg("Enter the admin key.", "err"); return; }
    try { sessionStorage.setItem("rk_admin_key", k); } catch (e) {}
    setMsg("Loading…");
    if (window.RC) {
      $("cards").innerHTML = window.RC.skeletonCards(4);
      $("tablewrap").innerHTML = window.RC.skeletonTable(6, 7);
    }
    var inv = ($("inv").value || "").trim();
    var url = "/v1/watchlist" + (inv ? "?investigation_id=" + encodeURIComponent(inv) : "");
    fetch(url, { headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) {
        if (res.status === 401) throw new Error("Unauthorized — check the key.");
        if (res.status === 503) throw new Error("API not configured (admin key / DB).");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (ov) { render(ov); setMsg("Updated " + new Date().toLocaleTimeString(), "ok"); })
      .catch(function (e) { setMsg(e.message, "err"); });
  }

  function runCheck() {
    var k = key();
    if (!k) { setMsg("Enter the admin key.", "err"); return; }
    $("run").disabled = true; setMsg("Running re-check…");
    fetch("/v1/watchlist/run", { method: "POST", headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) { if (!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
      .then(function (r) {
        setMsg("Re-check: " + r.snapshotted + "/" + r.candidates + " snapshotted, " + r.moved + " moved.", "ok");
        load();
      })
      .catch(function (e) { setMsg(e.message, "err"); })
      .finally(function () { $("run").disabled = false; });
  }

  var timer = null;
  $("load").addEventListener("click", load);
  $("run").addEventListener("click", runCheck);
  $("auto").addEventListener("change", function () {
    if (timer) { clearInterval(timer); timer = null; }
    $("live-dot").style.display = "none";
    if (this.checked) {
      timer = setInterval(load, 60000);
      $("live-dot").style.display = "inline-block";
      setMsg("Live · auto-refresh on", "ok");
    }
  });
  if (key()) { load(); }
})();
</script>
<script src="/v1/console/app.js" defer></script>
</body>
</html>
