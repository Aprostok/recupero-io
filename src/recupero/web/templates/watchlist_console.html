<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recupero â€” Watchlist Console</title>
<link rel="stylesheet" href="/v1/console/app.css">
<style>
  /* page-specific: watchlist */
  .card.alert .v { color: var(--crit); } .card.ok .v { color: var(--ok); }
  .chips span { display:inline-block; background: var(--surface); border:1px solid var(--hair); border-radius:999px; padding:.12rem .55rem; margin:0 .25rem .25rem 0; font-size:.78rem; }
  tr.moved td { background: var(--crit-soft); } td.age.stale { color: var(--crit); font-weight: 600; }
  .badge.moved { background: var(--crit-soft); color: var(--crit); }
  .badge.ok { background: rgba(29,138,78,.12); color: var(--ok); }
  .badge.new { background: var(--surface-2); color: var(--ink-soft); }
</style>
</head>
<body>
  <h1>ðŸ›°ï¸ Watchlist Console</h1>
  <div class="sub">Live view of everything under monitoring. Paste your operator key to load;
    data is fetched directly from the admin-gated API (the key stays in a request header, never the URL).</div>

  <div class="bar">
    <input id="key" type="password" placeholder="X-Recupero-Admin-Key" size="34" autocomplete="off">
    <input id="inv" type="text" placeholder="investigation id (optional)" size="22" autocomplete="off">
    <button id="load">Load</button>
    <button id="run" class="secondary">Run check now</button>
    <label class="sub"><input type="checkbox" id="auto"> auto-refresh 60s</label>
    <span id="msg"></span>
  </div>

  <div class="cards" id="cards"></div>
  <div class="chips" id="chips"></div>
  <div id="tablewrap"></div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  function esc(s) { var d = document.createElement("div"); d.textContent = (s == null ? "" : String(s)); return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  // Persist the key for the session only (not localStorage) â€” clears on tab close.
  try { $("key").value = sessionStorage.getItem("rk_admin_key") || ""; } catch (e) {}

  function setMsg(t, cls) { var m = $("msg"); m.textContent = t || ""; m.className = cls || ""; }

  function card(v, l, cls) { return '<div class="card ' + (cls||"") + '"><div class="v">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  function render(ov) {
    $("cards").innerHTML =
      card(ov.n_items, "Addresses watched") +
      card(ov.total_watched_usd_human, "Total under watch") +
      card(ov.n_moved, "Moved since last check", ov.n_moved ? "alert" : "") +
      card(ov.total_still_present_usd_human, "Still present", "ok") +
      card(ov.n_stale, "Due for re-check", ov.n_stale ? "alert" : "") +
      card(ov.n_never_checked, "Never checked");
    var chips = "<b>By status:</b> ";
    (ov.by_status || []).forEach(function (s) { chips += '<span>' + esc(s.emoji + " " + s.status + " Â· " + s.n) + '</span>'; });
    chips += ' &nbsp; <b>By chain:</b> ';
    (ov.by_chain || []).forEach(function (c) { chips += '<span>' + esc(c.chain + " Â· " + c.n + " Â· " + c.usd_human) + '</span>'; });
    $("chips").innerHTML = chips;

    var rows = ov.rows || [];
    if (!rows.length) { $("tablewrap").innerHTML = '<p class="sub">Nothing under watch yet.</p>'; return; }
    var h = '<table><thead><tr><th>Status</th><th>Address</th><th>Chain</th><th>Asset</th>' +
            '<th class="right">Balance USD</th><th>Movement</th><th>Î” prior</th><th>Last checked</th>' +
            '<th class="right">Days</th><th>Issuer / label</th></tr></thead><tbody>';
    rows.forEach(function (r) {
      var addr = r.explorer_url
        ? '<a href="' + esc(r.explorer_url) + '" target="_blank" rel="noopener">' + esc(r.address) + '</a>'
        : esc(r.address);
      h += '<tr class="' + (r.movement === "moved" ? "moved" : "") + '">' +
        '<td class="mono">' + esc(r.status_emoji + " " + r.status_label) + '</td>' +
        '<td class="mono">' + addr + '</td>' +
        '<td>' + esc(r.chain) + '</td><td>' + esc(r.asset_symbol) + '</td>' +
        '<td class="right">' + esc(r.balance_usd_human) + '</td>' +
        '<td><span class="badge ' + esc(r.movement_class) + '">' + esc(r.movement_badge) + '</span></td>' +
        '<td class="right">' + esc(r.last_delta_usd_human) + '</td>' +
        '<td class="age ' + (r.stale ? "stale" : "") + '" title="' + esc(r.last_checked_human) + '">' + esc(r.age_human) + '</td>' +
        '<td class="right">' + esc(r.days_watched) + '</td>' +
        '<td>' + esc(r.issuer) + (r.label_name && r.label_name !== "â€”" ? " Â· " + esc(r.label_name) : "") + '</td>' +
        '</tr>';
    });
    h += '</tbody></table>';
    $("tablewrap").innerHTML = h;
  }

  function key() { return ($("key").value || "").trim(); }

  function load() {
    var k = key();
    if (!k) { setMsg("Enter the admin key.", "err"); return; }
    try { sessionStorage.setItem("rk_admin_key", k); } catch (e) {}
    setMsg("Loadingâ€¦");
    var inv = ($("inv").value || "").trim();
    var url = "/v1/watchlist" + (inv ? "?investigation_id=" + encodeURIComponent(inv) : "");
    fetch(url, { headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) {
        if (res.status === 401) throw new Error("Unauthorized â€” check the key.");
        if (res.status === 503) throw new Error("API not configured (admin key / DB).");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function (ov) { render(ov); setMsg("Updated " + new Date().toLocaleTimeString(), "ok"); })
      .catch(function (e) { setMsg(e.message, "err"); });
  }

  function runCheck() {
    var k = key();
    if (!k) { setMsg("Enter the admin key.", "err"); return; }
    $("run").disabled = true; setMsg("Running re-checkâ€¦");
    fetch("/v1/watchlist/run", { method: "POST", headers: { "X-Recupero-Admin-Key": k } })
      .then(function (res) { if (!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
      .then(function (r) {
        setMsg("Re-check: " + r.snapshotted + "/" + r.candidates + " snapshotted, " + r.moved + " moved.", "ok");
        load();
      })
      .catch(function (e) { setMsg(e.message, "err"); })
      .finally(function () { $("run").disabled = false; });
  }

  var timer = null;
  $("load").addEventListener("click", load);
  $("run").addEventListener("click", runCheck);
  $("auto").addEventListener("change", function () {
    if (timer) { clearInterval(timer); timer = null; }
    if (this.checked) { timer = setInterval(load, 60000); }
  });
  if (key()) { load(); }
})();
</script>
<script src="/v1/console/app.js" defer></script>
</body>
</html>
